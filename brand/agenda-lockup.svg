<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&amp;family=Manrope:wght@600&amp;display=swap');
      .mk-letter { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 500; fill: #F0EDE8; }
      .mk-month  { font-family: 'Manrope', 'Segoe UI', Arial, sans-serif; font-weight: 600; fill: #E55A0C; letter-spacing: 0.4em; }
      .mk-day    { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 500; fill: #E55A0C; }
      .wm        { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 500; fill: #F0EDE8; letter-spacing: -0.01em; }
    </style>
  </defs>
  <!-- Mark 120×120 -->
  <rect width="120" height="120" fill="#E55A0C"/>
  <text class="mk-letter" x="55" y="89" font-size="110" text-anchor="middle">a</text>
  <text class="mk-month" x="60" y="71" font-size="5.4" text-anchor="middle">JUL</text>
  <text class="mk-day"   x="60" y="87" font-size="15.6" text-anchor="middle">11</text>
  <!-- Separator -->
  <rect x="138" y="20" width="1" height="80" fill="#F0EDE8" opacity="0.25"/>
  <!-- Wordmark -->
  <text class="wm" x="152" y="88" font-size="60">agenda</text>
</svg>
