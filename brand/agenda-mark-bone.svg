<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&amp;family=Manrope:wght@600&amp;display=swap');
      .mk-letter { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 500; fill: #0E0E0F; }
      .mk-month  { font-family: 'Manrope', 'Segoe UI', Arial, sans-serif; font-weight: 600; fill: #E55A0C; letter-spacing: 0.4em; }
      .mk-day    { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 500; fill: #E55A0C; }
    </style>
  </defs>
  <rect width="200" height="200" fill="#F0EDE8"/>
  <text class="mk-letter" x="92" y="148" font-size="184" text-anchor="middle">a</text>
  <text class="mk-month" x="100" y="119" font-size="9" text-anchor="middle">JUL</text>
  <text class="mk-day"   x="100" y="146" font-size="26" text-anchor="middle">11</text>
</svg>
