<link rel="stylesheet" href="/css/tokens.css?v=30">
<style>
/* ═══════════════════════════════════════════════════════════════
   AGENDA — SISTEMA DE TEMAS v2
   Três identidades: onyx (barbearia luxo) · feminine (salão) · neutral (básico)
   O tema é aplicado via classe no <html>: class="t-onyx" | "t-feminine" | "t-neutral"
   ═══════════════════════════════════════════════════════════════ */

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

/* ══════════════════════════════════════════════════
   TEMA NEUTRO (padrão / plano básico)
   Azul profissional · fundo claro · Inter/Syne
   ══════════════════════════════════════════════════ */
:root {
  /* ── Brand tokens (WCAG safe) ── */
  --c-brand:      #E55A0C;
  --c-brand-text: #C04A08; /* texto laranja sobre fundo claro — 5.28:1 AA ✅ */
  --c-brand-dark: #9C3A06;
  /* ── Tipografia ── */
  --font-heading: 'Manrope', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
  --text-h1:      clamp(28px, 6vw, 48px);
  --text-h2:      clamp(20px, 4vw, 32px);
  --text-h3:      clamp(15px, 2.5vw, 18px);
  --text-body:    15px;
  --text-label:   13px;
  --text-caption: 11px;
  --fw-heading:   800;
  --fw-subhead:   700;
  --fw-label:     600;
  --fw-body:      400;
}
:root,
html.t-neutral {
  /* Cores */
  --c-primary: #E55A0C;
  --c-primary-d: #C44D08;
  --c-primary-light: rgba(229,90,12,.12);
  --c-primary-glow: rgba(229,90,12,.3);
  --c-bg: #F8F4EF;
  --c-surface: #FFFFFF;
  --c-surface-2: #F2EDE7;
  --c-surface-3: #EAE0D5;
  --c-border: #D4C4B0;
  --c-border-2: rgba(0,0,0,.06);
  --c-text: #1A0E06;
  --c-text-2: #5C4033;
  --c-text-3: #9C8878;
  --c-green: #16A34A;
  --c-green-bg: rgba(22,163,74,.1);
  --c-red: #DC2626;
  --c-red-bg: rgba(220,38,38,.08);
  /* Tipografia */
  --font-head: 'Syne', sans-serif;
  --font-body: 'Nunito', sans-serif;
  /* Forma */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --r-full: 9999px;
  /* Sombras */
  --sh-sm: 0 1px 3px rgba(0,0,0,.08);
  --sh-md: 0 4px 12px rgba(0,0,0,.08);
  --sh-lg: 0 8px 24px rgba(0,0,0,.12);
  /* Tema */
  --confirm-bg: #0F172A;
  --confirm-text: #FFFFFF;
  --c-primary:#E55A0C;--c-primary-light:rgba(229,90,12,.12);--c-primary-glow:rgba(229,90,12,.3);
}

/* ══════════════════════════════════════════════════
   TEMA ONYX (barbearia de luxo)
   Preto carvão · dourado · Manrope · cantos retos
   ══════════════════════════════════════════════════ */
html.t-onyx {
  --c-primary: #E55A0C;
  --c-primary-d: #C44D08;
  --c-primary-light: rgba(229,90,12,.12);
  --c-primary-glow: rgba(229,90,12,.3);
  --c-bg: #131313;
  --c-surface: #1C1C1C;
  --c-surface-2: #242424;
  --c-surface-3: #2C2C2C;
  --c-border: rgba(255,255,255,.08);
  --c-border-2: rgba(255,255,255,.04);
  --c-text: #E5E2E1;
  --c-text-2: #A09080;
  --c-text-3: #5C5045;
  --c-green: #4ADE80;
  --c-green-bg: rgba(74,222,128,.1);
  --c-red: #F87171;
  --c-red-bg: rgba(248,113,113,.1);
  --font-head: 'Manrope', sans-serif;
  --font-body: 'Inter', sans-serif;
  --r-sm: 2px;
  --r-md: 4px;
  --r-lg: 8px;
  --r-xl: 12px;
  --r-full: 4px;
  --sh-sm: 0 1px 4px rgba(0,0,0,.4);
  --sh-md: 0 4px 16px rgba(0,0,0,.5);
  --sh-lg: 0 12px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
  --confirm-bg: #0E0E0E;
  --confirm-text: #E5E2E1;
}

/* ══════════════════════════════════════════════════
   TEMA FEMININE (salão feminino)
   Rosa / magenta · branco · Manrope · bordas arredondadas
   ══════════════════════════════════════════════════ */
html.t-feminine {
  --c-primary: #D81B60;
  --c-primary-d: #AD1457;
  --c-primary-light: rgba(216,27,96,.1);
  --c-primary-glow: rgba(216,27,96,.25);
  --c-bg: #FFFBFF;
  --c-surface: #FFFFFF;
  --c-surface-2: #FFF1F3;
  --c-surface-3: #FAEEF0;
  --c-border: #F4DDDF;
  --c-border-2: rgba(216,27,96,.08);
  --c-text: #201A1A;
  --c-text-2: #534344;
  --c-text-3: #908E8E;
  --c-green: #2E7D32;
  --c-green-bg: rgba(46,125,50,.08);
  --c-red: #C62828;
  --c-red-bg: rgba(198,40,40,.08);
  --font-head: 'Manrope', sans-serif;
  --font-body: 'Inter', sans-serif;
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-full: 9999px;
  --sh-sm: 0 1px 4px rgba(216,27,96,.06);
  --sh-md: 0 4px 14px rgba(216,27,96,.08);
  --sh-lg: 0 8px 28px rgba(216,27,96,.12);
  --confirm-bg: #2C1517;
  --confirm-text: #FFF1F3;
}
/* ══════════════════════════════════════════════════
   TEMA CLINIC — saúde, bem-estar, fitness premium
   Azul profissional · laranja da marca nos CTAs
   ══════════════════════════════════════════════════ */
html.t-clinic {
  --c-primary:       #2C6FAA; /* 4.7:1 sobre branco ✅ */
  --c-primary-d:     #1A4E7A;
  --c-primary-light: rgba(44,111,170,.10);
  --c-primary-glow:  rgba(44,111,170,.25);
  --c-bg:       #F4F8FB;
  --c-surface:  #FFFFFF;
  --c-surface-2:#E8F1F8;
  --c-surface-3:#D4E5F2;
  --c-border:   rgba(44,111,170,.20);
  --c-border-2: rgba(0,0,0,.04);
  --c-text:     #1C3A5E; /* 10.8:1 ✅ AAA */
  --c-text-2:   #3A6080; /* 5.2:1 ✅ AA */
  --c-text-3:   #5A7A9A; /* 3.9:1 — uso em caption ≥11px */
  --c-green:    #2E7D32;
  --c-green-bg: rgba(46,125,50,.10);
  --c-red:      #C62828;
  --c-red-bg:   rgba(198,40,40,.08);
  --font-head:  'Manrope', sans-serif;
  --font-body:  'Inter', sans-serif;
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  22px;
  --r-full:9999px;
  --sh-sm: 0 2px 8px rgba(28,58,94,.08);
  --sh-md: 0 4px 16px rgba(28,58,94,.10);
  --sh-lg: 0 8px 32px rgba(28,58,94,.14);
  --confirm-bg:   #1A4E7A;
  --confirm-text: #FFFFFF;
}

/* ══ CLEAN (Clínico/Médico) ══ */
html.t-clean {
  --c-primary:#1565C0; --c-primary-dark:#0D47A1;
  --c-primary-light:rgba(21,101,192,.08);
  --c-bg:#F4F7FB; --c-surface:#fff; --c-surface-2:#EDF2F8;
  --c-border:#C5D8EE; --c-text:#0D1B2E; --c-text-2:#3A5068; --c-text-3:#7A9AB5;
  --c-danger:#C62828; --c-success:#2E7D32;
}


/* ══ VERDE (Doméstico/Natural) ══ */
html.t-verde {
  --c-primary:#2E7D32; --c-primary-dark:#1B5E20;
  --c-primary-light:rgba(46,125,50,.09);
  --c-bg:#F4F9F4; --c-surface:#fff; --c-surface-2:#E8F5E9;
  --c-border:#B5D5B8; --c-text:#0A1F0B; --c-text-2:#2A4F2C; --c-text-3:#7AAB7D;
  --c-danger:#B71C1C; --c-success:#1B5E20;
}


/* ════════════════════════════════════════════════
   BASE LAYOUT (igual para todos os temas)
   ════════════════════════════════════════════════ */
body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.ag-header {
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--sh-sm);
}
html.t-onyx .ag-header { background: #0E0E0E; border-bottom-color: rgba(255,255,255,.06); }

.ag-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
@media(max-width:480px) { .ag-brand-word { display:none; } }
.ag-logo-wordmark {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--c-text);
  text-transform: uppercase;
}
html.t-onyx .ag-logo-wordmark { color: var(--c-primary); letter-spacing: 4px; }
html.t-feminine .ag-logo-wordmark { color: var(--c-primary); }

.ag-salon-name {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  color: var(--c-text-2);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
}
html.t-onyx .ag-salon-name { color: var(--c-text-2); }

.btn-meus-ags {
  background: var(--c-surface-2);
  color: var(--c-text-2);
  border: 1px solid var(--c-border);
  padding: 7px 12px;
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  font-family: var(--font-body);
  white-space: nowrap;
  flex-shrink: 0;
  transition: .15s;
}
.btn-meus-ags:hover { border-color: var(--c-primary); color: var(--c-primary); }

/* ── PAGE WRAP ── */
.ag-page {
  max-width: 560px;
  margin: 0 auto;
  padding: 16px 16px 120px;
}

/* ── PERFIL DO SALÃO ── */
.ag-perfil {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  padding: 16px 18px;
  margin-bottom: 16px;
  box-shadow: var(--sh-sm);
}
.ag-perfil-nome {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 800;
  color: var(--c-text);
  margin-bottom: 4px;
}
.ag-perfil-desc { font-size: 12px; color: var(--c-text-2); margin-bottom: 5px; line-height: 1.5; }
.ag-perfil-end { font-size: 12px; color: var(--c-text-3); margin-bottom: 3px; }
.ag-perfil-pgto { font-size: 12px; color: var(--c-text-3); display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

/* ── STEP INDICATOR ── */
.ag-steps {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 20px;
  padding: 0 2px;
}
.ag-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.ag-step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--c-surface-2);
  border: 2px solid var(--c-border);
  color: var(--c-text-3);
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .25s;
}
.ag-step-dot.active {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: var(--c-bg);
  box-shadow: 0 0 12px var(--c-primary-glow);
}
html.t-onyx .ag-step-dot.active { color: #131313; }
html.t-feminine .ag-step-dot.active { color: #fff; }

.ag-step-dot.done {
  background: var(--c-green);
  border-color: var(--c-green);
  color: #fff;
}
.ag-step-lbl {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--c-text-3);
  transition: .25s;
}
.ag-step-lbl.active { color: var(--c-primary); }
.ag-step-line {
  flex: 1;
  height: 1.5px;
  background: var(--c-border);
  margin-bottom: 18px;
  transition: .3s;
}
.ag-step-line.done { background: var(--c-green); }

/* ── SEÇÕES / BLOCOS ── */
.ag-bloco {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--sh-sm);
  transition: opacity .2s, box-shadow .2s, background .2s;
}
.ag-bloco.locked {
  background: var(--c-surface-2);
  box-shadow: none;
  opacity: .7;
}
@keyframes blocoIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.ag-bloco.ag-entrando {
  animation: blocoIn .28s cubic-bezier(.34,1.56,.64,1) both;
}
html.t-onyx .ag-bloco { background: var(--c-surface); border-color: var(--c-border); }
html.t-onyx .ag-bloco.locked { background: var(--c-surface-2); }

.ag-bloco-hdr {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ag-bloco-hdr-l { display: flex; align-items: center; gap: 10px; }
.ag-bloco-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--c-primary);
  color: var(--c-bg);
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
html.t-onyx .ag-bloco-num { color: #131313; }
html.t-feminine .ag-bloco-num { color: #fff; }

.ag-bloco.locked .ag-bloco-num {
  background: var(--c-border);
  color: var(--c-text-3);
}
.ag-bloco-title {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 800;
  color: var(--c-text);
  margin: 0;
}

/* ONYX: títulos dos blocos em maiúsculas com tracking */
html.t-onyx .ag-bloco-title {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--c-text-2);
}

.ag-bloco.locked .ag-bloco-title { color: var(--c-text-3); }
.ag-bloco-sel {
  font-size: 11px;
  font-weight: 700;
  color: var(--c-primary);
  flex-shrink: 0;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── SERVIÇOS ── */
.ag-srv-list {
  padding: 0 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.srv-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--c-surface-2);
  border: 2px solid transparent;
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: .15s;
}
.srv-card:hover { border-color: var(--c-primary-light); background: var(--c-surface-3); }
.srv-card.ativo {
  background: var(--c-primary-light);
  border-color: var(--c-primary);
}

/* ONYX: service cards com estética editorial */
html.t-onyx .srv-card {
  background: var(--c-surface-2);
  border-radius: var(--r-md);
  padding: 14px 16px;
}
html.t-onyx .srv-card:hover { background: var(--c-surface-3); border-color: var(--c-primary); }
html.t-onyx .srv-card.ativo {
  background: var(--c-surface-3);
  border-color: var(--c-primary);
}

.srv-ico {
  font-size: 22px;
  flex-shrink: 0;
  width: 30px;
  text-align: center;
}

/* ONYX: ícone substituído por div colorido */
html.t-onyx .srv-ico-wrap {
  width: 36px;
  height: 36px;
  background: var(--c-primary-light);
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
html.t-onyx .srv-card.ativo .srv-ico-wrap { background: rgba(242,202,80,.2); }

.srv-n { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--c-text); flex: 1; min-width: 0; }
.srv-p { font-family: var(--font-head); font-size: 15px; font-weight: 800; color: var(--c-primary); white-space: nowrap; }
.srv-m { font-size: 11px; color: var(--c-text-3); white-space: nowrap; margin-left: 4px; }

html.t-onyx .srv-n { font-size: 13px; letter-spacing: .3px; color: var(--c-text); }
html.t-onyx .srv-p { font-size: 18px; font-weight: 800; }
/* Preços em fundos claros — WCAG AA (laranja escuro ou cor primária do tema) */
html.t-neutral .srv-p  { color: #C04A08; } /* 5.28:1 ✅ AA */
html.t-feminine .srv-p { color: #AD1457; } /* 6.8:1 ✅ AA */
html.t-clinic .srv-p   { color: #1A4E7A; } /* 7.2:1 ✅ AA */
html.t-onyx .srv-m { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

html.t-feminine .srv-n { font-size: 14px; }
html.t-feminine .srv-card { border-radius: 20px; }
html.t-feminine .srv-card.ativo { background: rgba(216,27,96,.08); }

/* ── PROFISSIONAIS ── */
.prof-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  padding: 0 14px 14px;
}
.prof-card {
  padding: 10px 8px;
  background: var(--c-surface-2);
  border: 2px solid transparent;
  border-radius: var(--r-lg);
  cursor: pointer;
  text-align: center;
  transition: .15s;
}
.prof-card:hover { background: var(--c-surface-3); }
.prof-card.sel { background: var(--c-primary-light); border-color: var(--c-primary); }
.prof-dot { width: 44px; height: 44px; border-radius: 50%; display: block; margin: 0 auto 6px; }
.prof-foto { display: block; }
.prof-nome { font-size: 12px; font-weight: 800; color: var(--c-text); font-family: var(--font-head); }
.prof-esp { font-size: 10px; color: var(--c-text-3); margin-top: 2px; }

/* ── DIAS ── */
.dias-scroll {
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 14px 14px;
  -webkit-overflow-scrolling: touch;
}
.dias-scroll::-webkit-scrollbar { display: none; }
.dia-list { display: flex; gap: 7px; min-width: max-content; }
.dia-card {
  flex: 0 0 54px;
  padding: 9px 4px;
  background: var(--c-surface-2);
  border: 2px solid transparent;
  border-radius: var(--r-lg);
  cursor: pointer;
  text-align: center;
  transition: .15s;
}
.dia-card:hover:not(.fechado):not(.bl) { border-color: var(--c-primary); background: var(--c-surface-3); }
.dia-card.ativo { background: var(--c-primary); border-color: var(--c-primary); }
.dia-card.fechado,.dia-card.bl { opacity: .3; cursor: not-allowed; }
.dia-card.bloqueado { opacity: .4; cursor: not-allowed; position: relative; }
.dia-card.bloqueado::after { content: '🚫'; position: absolute; top: 1px; right: 1px; font-size: 8px; }
.d-sem { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--c-text-3); margin-bottom: 3px; }
.d-num { font-family: var(--font-head); font-size: 18px; font-weight: 800; color: var(--c-text); line-height: 1; }
.d-mes { font-size: 9px; font-weight: 700; color: var(--c-text-3); margin-top: 1px; }
.dia-card.ativo .d-sem,
.dia-card.ativo .d-num,
.dia-card.ativo .d-mes { color: var(--c-bg); }
html.t-feminine .dia-card.ativo .d-sem,
html.t-feminine .dia-card.ativo .d-num,
html.t-feminine .dia-card.ativo .d-mes { color: #fff; }

/* ONYX dias: formato diferenciado */
html.t-onyx .dia-card { border-radius: var(--r-sm); }
html.t-onyx .dia-card.ativo { background: var(--c-primary); }
html.t-onyx .dia-card.ativo .d-num { color: #131313; font-weight: 900; }
html.t-onyx .dia-card.ativo .d-sem,
html.t-onyx .dia-card.ativo .d-mes { color: rgba(19,19,19,.7); }

/* ── HORÁRIOS ── */
.h-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(66px, 1fr));
  gap: 7px;
  padding: 0 14px 14px;
}
/* ── CHIPS DE HORÁRIO — contraste garantido em todos os temas ── */
.h-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 10px 16px;
  background: var(--c-surface-2);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r-md);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--c-text);
  text-align: center;
  transition: background .15s, transform .1s, border-color .15s;
  position: relative;
}
.h-btn::after {
  content: '';
  position: absolute;
  top: 5px;
  right: 5px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--c-primary);
  opacity: 0;
  transition: .15s;
}
.h-btn:not(.oc)::after { opacity: .8; }
.h-btn:hover:not(.oc):not(.sel) {
  border-color: var(--c-primary);
  color: var(--c-primary);
  background: var(--c-primary-light);
}
.h-btn.oc { opacity: .35; cursor: not-allowed; text-decoration: line-through; }
.h-btn.sel {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #FFFFFF;
  box-shadow: 0 4px 14px var(--c-primary-glow);
  font-weight: 700;
  transform: scale(1.06);
}

/* Onyx: fundo carvão escuro, texto bege claro, selecionado laranja + branco */
html.t-onyx .h-btn {
  border-radius: var(--r-sm);
  font-family: 'Manrope', sans-serif;
  letter-spacing: .3px;
  background: #2A2A2A;
  color: #E5E2E1;    /* 15:1 ✅ AAA */
  border-color: rgba(255,255,255,0.12);
}
html.t-onyx .h-btn:hover:not(.oc):not(.sel) {
  background: #333333;
  color: #E55A0C;
  border-color: #E55A0C;
}
html.t-onyx .h-btn.sel {
  background: #E55A0C;
  color: #FFFFFF;    /* 4.6:1 ✅ AA em btn grande */
}

/* Neutral: fundo branco, texto escuro quente */
html.t-neutral .h-btn {
  background: #FFFFFF;
  color: #1A0E06;    /* 17.2:1 ✅ AAA */
  border-color: #C8B8A8;
  font-weight: 700;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
html.t-neutral .h-btn.sel {
  background: #E55A0C;
  color: #FFFFFF;
}
html.t-neutral .h-btn:hover:not(.oc):not(.sel) {
  border-color: #E55A0C;
  color: #C04A08;    /* 5.28:1 ✅ AA */
  background: #FFFFFF;
}

/* Feminine: fundo rosa suave, texto escuro, selecionado rosa */
html.t-feminine .h-btn {
  border-radius: 14px;
  background: #FFF1F3;
  color: #201A1A;    /* 18.1:1 ✅ AAA */
  border-color: rgba(216,27,96,.20);
}
html.t-feminine .h-btn.sel {
  background: #D81B60;
  color: #FFFFFF;    /* 5.5:1 ✅ AA */
}
html.t-feminine .h-btn:hover:not(.oc):not(.sel) {
  border-color: #D81B60;
  color: #AD1457;
  background: rgba(216,27,96,.06);
}

/* Clinic: fundo azul claro, texto azul escuro, selecionado azul médio */
html.t-clinic .h-btn {
  background: #E8F1F8;
  color: #1C3A5E;    /* 10.8:1 ✅ AAA */
  border-color: rgba(44,111,170,.20);
}
html.t-clinic .h-btn.sel {
  background: #2C6FAA;
  color: #FFFFFF;    /* 4.7:1 ✅ AA */
}
html.t-clinic .h-btn:hover:not(.oc):not(.sel) {
  border-color: #2C6FAA;
  color: #1A4E7A;
  background: rgba(44,111,170,.08);
}

/* ── FORM DADOS ── */
.ag-form { padding: 0 14px 14px; }
.ag-resumo {
  background: var(--c-surface-2);
  border-radius: var(--r-md);
  padding: 10px 14px;
  margin-bottom: 14px;
  display: none;
  flex-wrap: wrap;
  gap: 6px;
}
.ag-resumo.show { display: flex; }
.r-chip {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-full);
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--c-text-2);
}
.r-chip.hot { background: var(--c-primary-light); color: var(--c-primary); border-color: var(--c-primary-light); }

.ag-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.ag-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--c-text-3);
}
.ag-input {
  background: var(--c-surface-2);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 13px 16px;
  font-size: 15px;
  font-family: var(--font-body);
  color: var(--c-text);
  width: 100%;
  outline: none;
  transition: .2s;
}
.ag-input:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 3px var(--c-primary-light);
  background: var(--c-surface);
}
.ag-input::placeholder { color: var(--c-text-3); }
html.t-onyx .ag-input {
  background: var(--c-surface-2);
  border-color: var(--c-border);
  color: var(--c-text);
  border-radius: var(--r-sm);
}
html.t-onyx .ag-input::placeholder { color: var(--c-text-3); }

.ag-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── BOTÃO CONFIRMAR ── */
.btn-ag {
  width: 100%;
  padding: 16px;
  background: var(--c-primary) !important;
  color: #FFFFFF !important;
  border: none;
  border-radius: var(--r-xl);
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: .2s;
  box-shadow: 0 6px 20px var(--c-primary-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
  letter-spacing: .3px;
}
.btn-ag:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ag:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; transform: none; }
html.t-onyx .btn-ag { color: #FFFFFF; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 13px; }
html.t-feminine .btn-ag { background: #D81B60 !important; color: #fff; }
html.t-clinic .btn-ag { background: #E55A0C !important; color: #FFFFFF !important; }

/* ── PRÓXIMOS SALÕES ── */
.ag-proximos {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  padding: 16px;
  margin-bottom: 12px;
}
.prox-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--c-border); cursor: pointer; }
.prox-card:last-child { border-bottom: none; }
.prox-ico { font-size: 22px; flex-shrink: 0; }
.prox-info { flex: 1; min-width: 0; }
.prox-nm { font-size: 13px; font-weight: 800; color: var(--c-text); }
.prox-end { font-size: 11px; color: var(--c-text-3); margin-top: 1px; }
.prox-dist { font-size: 11px; font-weight: 700; color: var(--c-primary); flex-shrink: 0; }
.pgto-tag,.r-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:700}
.pgto-tag{background:var(--c-green-bg);color:var(--c-green);border:1px solid transparent}

/* ── CONFIRMAÇÃO ── */
.confirm-screen {
  display: none;
  flex-direction: column;
  padding: 20px 16px 40px;
  max-width: 560px;
  margin: 0 auto;
  text-align: center;
  min-height: calc(100vh - 60px);
  justify-content: center;
}
.confirm-screen.show { display: flex; }
.confirm-check { font-size: 52px; margin-bottom: 12px; }
.confirm-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  color: var(--c-text);
  margin-bottom: 6px;
}
html.t-onyx .confirm-title { color: var(--c-primary); letter-spacing: -1px; font-size: 26px; }
html.t-feminine .confirm-title { color: var(--c-primary); }

.confirm-sub { font-size: 14px; color: var(--c-text-2); line-height: 1.6; margin-bottom: 20px; }
.confirm-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-xl);
  padding: 18px;
  margin-bottom: 16px;
  text-align: left;
  box-shadow: var(--sh-md);
}
html.t-onyx .confirm-card { background: var(--c-surface-2); border-color: var(--c-border); }
.confirm-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--c-border);
  font-size: 13px;
}
.confirm-row:last-child { border-bottom: none; }
.confirm-lbl { color: var(--c-text-3); font-weight: 600; }
.confirm-val { color: var(--c-text); font-weight: 800; font-family: var(--font-head); text-align: right; max-width: 60%; }

/* ── BOTTOM CONFIRM BAR (ONYX) ── */
.ag-confirm-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, var(--c-bg) 80%, transparent);
  display: none;
}
html.t-onyx .ag-confirm-bar { display: none; }
html.t-onyx .ag-confirm-bar.ativo { display: block; }
.ag-confirm-bar-inner {
  max-width: 560px;
  margin: 0 auto;
  background: #0E0E0E;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-xl);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 24px 48px rgba(0,0,0,.7);
}
.ag-cb-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.ag-cb-icon {
  width: 40px; height: 40px;
  background: var(--c-primary-light);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.ag-cb-details { min-width: 0; }
.ag-cb-name { font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 800; color: #E5E2E1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ag-cb-meta { font-size: 11px; color: #5C5045; margin-top: 2px; }
.ag-cb-price { font-family: 'Manrope', sans-serif; font-size: 16px; font-weight: 800; color: var(--c-primary); flex-shrink: 0; }

/* WhatsApp */
.btn-wa-confirm {
  width: 100%;
  padding: 14px;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: var(--r-lg);
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 3px 12px rgba(37,211,102,.3);
}
.btn-close-confirm {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--c-text-2);
  border: 1.5px solid var(--c-border);
  border-radius: var(--r-md);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: .15s;
}
.btn-close-confirm:hover { border-color: var(--c-primary); color: var(--c-primary); }

/* ── ESTADOS ── */
.loading,.empty{padding:20px;text-align:center;color:var(--c-text-3);font-size:13px;line-height:1.6}
.erro{background:var(--c-red-bg);border:1px solid var(--c-red);border-radius:var(--r-md);padding:14px;text-align:center;color:var(--c-red);font-weight:700;font-size:13px;margin:12px 14px}
.pix-box{background:var(--c-green-bg);border:1px solid rgba(22,163,74,.2);border-radius:var(--r-md);padding:12px 14px;margin-top:10px}
.pix-tit{font-size:11px;font-weight:800;color:var(--c-green);margin-bottom:6px}
.pix-key{background:var(--c-surface);border-radius:6px;padding:8px 10px;font-size:11px;word-break:break-all;color:var(--c-text);cursor:pointer;border:1px solid rgba(22,163,74,.2)}

/* ── ONYX: EYEBROW ── */
html.t-onyx .ag-bloco-hdr {
  padding: 16px 20px;
  border-bottom: 1px solid var(--c-border);
}
html.t-onyx .ag-bloco-hdr::after {
  content: none;
}
html.t-onyx .ag-step-num {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--c-primary);
  display: block;
  margin-bottom: 3px;
}

/* ── FEMININE: decorativo ── */
html.t-feminine .ag-bloco {
  border-radius: 24px;
  box-shadow: 0 2px 12px rgba(216,27,96,.06);
}
html.t-feminine .ag-bloco-hdr { padding: 16px 20px; }
html.t-feminine .ag-bloco-title { font-size: 16px; }
html.t-feminine .srv-card { border-radius: 20px; padding: 14px 16px; }
html.t-feminine .dia-card { border-radius: 18px; }
html.t-feminine .ag-confirm-bar { display: none; }

/* ── RESPONSIVO ── */
@media(min-width:480px){
  .ag-page { padding: 20px 22px 120px; max-width: 620px; }
  .ag-srv-list { padding: 0 18px 18px; }
  .dias-scroll { padding: 0 18px 14px; }
  .h-grid { padding: 0 18px 14px; grid-template-columns: repeat(auto-fill, minmax(76px,1fr)); }
  .ag-form { padding: 0 18px 18px; }
  .prof-grid { padding: 0 18px 18px; }
}
@media(min-width:768px){
  .ag-page { max-width: 680px; padding: 28px 0 120px; }
  .ag-srv-list { display: grid; grid-template-columns: 1fr 1fr; }
  .h-grid { grid-template-columns: repeat(auto-fill, minmax(84px,1fr)); }
  .prof-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); }
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .ag-page { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
}

.page{display:block}

@media(max-width:380px){
  .ag-page{padding:10px 10px 100px}
  .h-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:5px;padding:0 10px 10px}
  .dia-card{flex:0 0 48px}
  .srv-card{padding:10px 12px;gap:8px}
}
@media(min-width:1024px){
  .ag-page{max-width:800px;padding:28px 0 80px}
  .ag-srv-list{grid-template-columns:1fr 1fr 1fr}
  .h-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr))}
}
@media(min-width:1440px){
  .ag-page{max-width:960px}
}


.wordmark{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:-.04em;color:var(--text,#1D1D1F);display:inline-flex;align-items:baseline;line-height:1}
.wm-dot{display:inline-block;width:.2em;height:.2em;border-radius:50%;background:#E55A0C;margin-left:2px;position:relative;top:-.52em;flex-shrink:0}
.brand-lockup{display:inline-flex;align-items:center;gap:10px;text-decoration:none}

/* ── New theme system (Agenda v2) ── */
html.t-azure{--c-primary:#3B82F6;--c-bg:#F0F4FF;--c-card:#fff;--c-text:#0F172A;--c-text2:#475569}
html.t-emerald{--c-primary:#10B981;--c-bg:#F0FDF8;--c-card:#fff;--c-text:#064E3B;--c-text2:#065F46}
html.t-rose{--c-primary:#DB2777;--c-bg:#FFF0F6;--c-card:#fff;--c-text:#500724;--c-text2:#9D174D}
html.t-crimson{--c-primary:#EF4444;--c-bg:#FFF5F5;--c-card:#fff;--c-text:#1A0000;--c-text2:#991B1B}
html.t-azure body,html.t-emerald body,html.t-rose body,html.t-crimson body{
  background:var(--c-bg,var(--c-bg-page,#F5F5F7));color:var(--c-text,#1D1D1F)}

/* ── Theme system ── */
:root, html.t-obsidian {
  --primary:#E55A0C; --primary-dark:#C44D08; --primary-bg:rgba(229,90,12,.12);
  --primary-d:#C44D08; --primary-light:rgba(229,90,12,.12); --primary-shadow:rgba(229,90,12,.22); --primary-bg-mid:rgba(229,90,12,.14);
  --L:#E55A0C; --apt-blue:#4A9EFF; --apt-orange:#E55A0C; --apt-green:#34C759; --apt-purple:#AF52DE;
  --bg:#0C0A09; --bg-page:#0C0A09; --bg-card:#1A1714; --bg-card-2:#242018;
  --bg-input:rgba(255,255,255,.07); --bg-topbar:rgba(12,10,9,.92); --bg-bottom-nav:rgba(18,15,13,.95);
  --surface:#1A1714; --surface-2:#242018; --surface-3:#2E2A24; --BG:#0C0A09; --BG-card:#1A1714;
  --text:#FFFFFF; --text-2:#9B9B9B; --text-3:#5A5A5A; --text-placeholder:#4A4A4A;
  --text-primary:#FFFFFF; --text-secondary:#9B9B9B; --text-tertiary:#5A5A5A;
  --MR:#FFFFFF; --CZ:#9B9B9B; --CF:#5A5A5A;
  --sep:rgba(255,255,255,.07); --sep-strong:rgba(255,255,255,.14);
  --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.04); --bd:rgba(255,255,255,.07);
  --success:#34C759; --success-bg:rgba(52,199,89,.12); --green:#34C759; --green-bg:rgba(52,199,89,.12); --green-border:rgba(52,199,89,.2);
  --error:#FF3B30;  --error-bg:rgba(255,59,48,.12);   --red:#FF3B30;  --red-bg:rgba(255,59,48,.12);  --red-border:rgba(255,59,48,.2);
  --warning:#FF9500; --warning-bg:rgba(255,149,0,.12); --amber:#FF9500; --amber-bg:rgba(255,149,0,.12); --amber-border:rgba(255,149,0,.2);
  --VD:#34C759; --VM:#FF3B30; --AM:#FF9500; --info:#007AFF; --info-bg:rgba(0,122,255,.12);
  --font-brand:'Sora',sans-serif; --font-body:'Nunito Sans',sans-serif;
  --font-d:'Sora',sans-serif; --font-b:'Nunito Sans',sans-serif;
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px;
  --sh-sm:0 1px 4px rgba(0,0,0,.4); --sh-md:0 4px 16px rgba(0,0,0,.5); --sh-lg:0 8px 32px rgba(0,0,0,.6);
  --sb-bg:#0C0A09; --sb-border:rgba(255,255,255,.07); --sb-text:rgba(255,255,255,.4);
  --sb-text-hover:rgba(255,255,255,.9); --sb-active-bg:rgba(229,90,12,.15); --sb-active-text:#E55A0C;
  --topbar-bg:rgba(12,10,9,.92); --topbar-border:rgba(255,255,255,.07);
  --s2:#242018; --CR:#1A1714; --BE:#1A1714;
  --marrom:#0C0A09; --cinza:#9B9B9B; --laranja:#E55A0C; --verde:#34C759; --branco:#fff; --cinza3:#5A5A5A; --preto:#0C0A09;
  --c-bg:#0C0A09;--c-surface:#1A1714;--c-surface-2:#242018;--c-surface-3:#2E2A24;
  --c-primary:#E55A0C;--c-primary-light:rgba(229,90,12,.12);--c-primary-glow:rgba(229,90,12,.28);
  --c-text:#FFFFFF;--c-text-2:#9B9B9B;--c-text-3:#5A5A5A;
  --c-border:rgba(255,255,255,.07);
  --c-green:#34C759;--c-green-bg:rgba(52,199,89,.12);
  --c-red:#FF3B30;--c-red-bg:rgba(255,59,48,.12);

/* AZURE — light blue (dentistas, clínicas) */

/* ═══ v33: PROFILE PAGE ═══ */
.prof-hero{background:var(--c-surface);border-bottom:1px solid var(--c-border)}
.hero-info{padding:16px 18px 18px;position:relative}
.hero-avatar{width:64px;height:64px;border-radius:var(--r-lg);background:var(--c-primary);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:26px;font-weight:800;color:#fff;border:3px solid var(--c-surface);margin-top:-32px;position:relative;z-index:1}
.hero-name{font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--c-text);margin-top:10px}
.hero-desc{font-size:13px;color:var(--c-text-2);margin-top:4px;line-height:1.5}
.status-bar{padding:10px 18px;border-bottom:1px solid var(--c-border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.status-open{color:var(--c-green)}
.status-closed{color:var(--c-red)}
.cta-bar{padding:12px 16px;background:var(--c-surface);border-bottom:1px solid var(--c-border);position:sticky;top:57px;z-index:40;box-shadow:var(--sh-sm)}
.btn-cta{width:100%;padding:14px;background:var(--c-primary);color:#fff;border:none;border-radius:var(--r-xl);font-size:16px;font-weight:800;font-family:var(--font-head);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px var(--c-primary-glow);transition:.15s}
.btn-cta:hover{filter:brightness(1.07);transform:translateY(-1px)}
.prof-section{padding:20px 18px;border-bottom:1px solid var(--c-border)}
.prof-section-title{font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--c-text);margin-bottom:14px}
.svc-scroll{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin:0 -18px;padding:0 18px 4px}
.svc-scroll::-webkit-scrollbar{display:none}
.svc-list{display:flex;gap:10px;min-width:max-content}
.svc-card{flex:0 0 148px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-lg);padding:14px 12px;cursor:pointer;transition:.15s;box-shadow:var(--sh-sm)}
.svc-card:hover,.svc-card:active{border-color:var(--c-primary);background:var(--c-primary-light)}
.svc-card-ico{font-size:24px;margin-bottom:8px}
.svc-card-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:4px;line-height:1.3}
.svc-card-price{font-size:15px;font-weight:800;color:var(--c-primary)}
.svc-card-dur{font-size:11px;color:var(--c-text-3);margin-top:2px}
html.t-neutral .svc-card-price{color:#C04A08}
html.t-feminine .svc-card-price{color:#AD1457}
html.t-clinic .svc-card-price{color:#1A4E7A}
.team-scroll{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin:0 -18px;padding:0 18px 4px}
.team-scroll::-webkit-scrollbar{display:none}
.team-list{display:flex;gap:10px;min-width:max-content}
.team-card{flex:0 0 90px;text-align:center;cursor:pointer;padding:12px 8px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-lg);transition:.15s}
.team-card:hover{border-color:var(--c-primary)}
.team-foto{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid var(--c-border)}
.team-foto img{width:100%;height:100%;object-fit:cover;display:block}
.team-nome{font-size:12px;font-weight:700;color:var(--c-text)}
.team-esp{font-size:10px;color:var(--c-text-3);margin-top:2px}
.avg-rating{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.avg-num{font-family:var(--font-head);font-size:36px;font-weight:800;color:var(--c-text)}
.avg-stars{color:#F59E0B;font-size:18px}
.avg-total{font-size:12px;color:var(--c-text-3)}
.reviews-list{display:flex;flex-direction:column;gap:10px}
.review-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:14px}
.review-stars{color:#F59E0B;font-size:13px;margin-bottom:6px}
.review-text{font-size:13px;color:var(--c-text-2);line-height:1.5}
.review-author{font-size:11px;color:var(--c-text-3);margin-top:6px;font-weight:600}
.hours-list{display:flex;flex-direction:column}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--c-border);font-size:13px}
.hours-row:last-child{border-bottom:none}
.hours-day{color:var(--c-text-2);font-weight:600}
.hours-time{color:var(--c-text);font-weight:700}
.hours-closed{color:var(--c-text-3);font-style:italic}
.pay-chips{display:flex;flex-wrap:wrap;gap:8px}
.pay-chip{padding:6px 14px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-full);font-size:12px;font-weight:600;color:var(--c-text-2)}
.loc-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.fab-wrapper{position:fixed;bottom:24px;right:18px;z-index:45}
.fab{background:var(--c-primary);color:#fff;border:none;border-radius:var(--r-full);padding:14px 22px;font-size:15px;font-weight:800;font-family:var(--font-head);cursor:pointer;box-shadow:0 6px 24px var(--c-primary-glow);display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap}
.fab:hover{filter:brightness(1.1);transform:translateY(-2px)}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;opacity:0;pointer-events:none;transition:opacity .28s}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--c-bg);border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,0,.67,1);box-shadow:0 -8px 40px rgba(0,0,0,.25)}
html.t-onyx .sheet{background:#0E0E0E}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--c-border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--c-border)}
.sheet-title{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--c-text)}
.sheet-close{background:var(--c-surface-2);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;color:var(--c-text-2);display:flex;align-items:center;justify-content:center;line-height:1}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.sheet-body .ag-page{padding-bottom:100px}
.sheet-body .ag-confirm-bar{position:sticky;bottom:0;display:none}
html.t-onyx .sheet-body .ag-confirm-bar.ativo{display:block}
.confetti{position:relative;height:0;overflow:visible}
.confetti i{display:inline-block;width:10px;height:10px;position:absolute;top:0;left:50%;border-radius:2px;opacity:0}
@keyframes confettiL{0%{transform:translate(-50%,0) rotate(0);opacity:1}100%{transform:translate(-180px,120px) rotate(720deg);opacity:0}}
@keyframes confettiC{0%{transform:translate(-50%,0) rotate(0);opacity:1}100%{transform:translate(-50%,140px) rotate(-360deg);opacity:0}}
@keyframes confettiR{0%{transform:translate(-50%,0) rotate(0);opacity:1}100%{transform:translate(80px,110px) rotate(540deg);opacity:0}}
/* ═══ v40: BIG-TECH WEBSITE ═══ */
.ws-hero{position:relative;overflow:hidden;min-height:320px;display:flex;align-items:flex-end;background:#111}
.ws-hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,var(--c-primary-light),#111);z-index:0}
.ws-hero-bg img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85}
.ws-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.32) 55%,rgba(0,0,0,.08) 100%);z-index:1}
.ws-hero-content{position:relative;z-index:2;padding:24px 20px 28px;width:100%;max-width:700px;box-sizing:border-box}
.ws-tag{display:inline-block;background:var(--c-primary);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-full);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.ws-name{font-family:var(--font-head);font-size:clamp(26px,7vw,42px);font-weight:800;color:#fff;line-height:1.1;margin-bottom:6px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.ws-addr{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ws-rating{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ws-status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ws-status-dot.open{background:#4ADE80}
.ws-status-dot.closed{background:#F87171}
.ws-status-txt{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
/* section nav */
.ws-nav{background:var(--c-bg);border-bottom:1.5px solid var(--c-border);position:sticky;top:52px;z-index:70;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ws-nav::-webkit-scrollbar{display:none}
.ws-nav-inner{display:flex;gap:2px;padding:0 14px;min-width:max-content}
.ws-nav-btn{padding:12px 14px;font-size:13px;font-weight:700;color:var(--c-text-2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--font-body)}
.ws-nav-btn:hover,.ws-nav-btn.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
/* sections */
.ws-section{padding:40px 20px;border-top:1px solid var(--c-border);max-width:720px;margin:0 auto;box-sizing:border-box}
.ws-section-wrap{width:100%;border-top:1px solid var(--c-border)}
.ws-section-title{font-family:var(--font-head);font-size:clamp(18px,4vw,24px);font-weight:800;color:var(--c-text);margin-bottom:20px;letter-spacing:-.02em}
.ws-name-row{display:none}
.ws-cat{display:none}
.dif-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.dif-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:14px 12px;text-align:center}
.dif-ico{font-size:28px;margin-bottom:8px}
.dif-title{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:4px}
.dif-desc{font-size:11px;color:var(--c-text-3);line-height:1.4}
.sobre-text{font-size:14px;color:var(--c-text-2);line-height:1.6;overflow:hidden;position:relative}
.sobre-text.collapsed{max-height:72px}
.sobre-text.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--c-bg))}
.sobre-toggle{font-size:13px;font-weight:700;color:var(--c-primary);margin-top:8px;cursor:pointer;background:none;border:none;padding:0;display:block;font-family:var(--font-body)}
.sobre-meta{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}

.video-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:var(--r-lg);overflow:hidden}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.ws-srv-list{display:flex;flex-direction:column;gap:10px}
.ws-srv-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-lg);cursor:pointer;transition:.15s}
.ws-srv-card:hover{border-color:var(--c-primary);background:var(--c-primary-light)}

function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function supaRpc(fn, body){
  const r = await fetch(SUPA_URL+'/rest/v1/rpc/'+fn, {
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok) return null;
  return r.json();
}
async function supa(path, opts={}) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
  return r.status===204?null:r.json();
}

// ── STEP INDICATOR UPDATE ──
function updateSteps(){
  const step = S.srv ? (S.dataStr ? (S.hora ? 4 : 3) : 2) : 1;
  [1,2,3,4].forEach(i=>{
    const dot=document.getElementById('sdot'+i);
    const lbl=document.getElementById('slbl'+i);
    if(!dot) return;
    dot.classList.remove('active','done');
    lbl.classList.remove('active');
    if(i < step){ dot.classList.add('done'); dot.textContent='✓'; }
    else if(i === step){ dot.classList.add('active'); dot.textContent=i; lbl.classList.add('active'); }
    else { dot.textContent=i; }
    if(i < 4){
      const line=document.getElementById('sline'+i);
      if(line) line.classList.toggle('done', i < step);
    }
  });
}

async function applyTheme(){
  try{
    var slug2=new URLSearchParams(location.search).get('slug');
    if(!slug2) return;
    var r=await fetch('https://acldrisohnjfekjxgmoh.supabase.co/rest/v1/saloes?slug=eq.'+slug2+'&select=tema',
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    var d=await r.json();
    // tema is stored as {template:"onyx"} or as legacy string "t-obsidian"
    var raw=(d&&d[0]&&d[0].tema)||null;
    var tema;
    if(raw && typeof raw === 'object' && raw.template){
      tema='t-'+raw.template;
    } else if(typeof raw === 'string'){
      tema=raw;
    } else {
      tema='t-onyx';
    }
    // Map old names to new admin themes
    var legado={
      't-obsidian':'t-onyx','t-azure':'t-neutral','t-emerald':'t-neutral',
      't-rose':'t-feminine','t-crimson':'t-feminine','t-indigo':'t-feminine',
      't-clean':'t-neutral','t-verde':'t-neutral'
    };
    tema=legado[tema]||tema;
    // Valid themes
    var validos=['t-onyx','t-feminine','t-neutral','t-clinic'];
    if(validos.indexOf(tema)<0) tema='t-onyx';
    // Apply
    validos.concat(['t-obsidian','t-azure','t-emerald','t-rose','t-crimson']).forEach(function(t){
      document.documentElement.classList.remove(t);
      document.body.classList.remove(t);
    });
    document.documentElement.classList.add(tema);
    document.body.className=tema;
  }catch(e){console.warn('applyTheme:',e);}
}

  const isBasico=(plano||salao.plano)==='basico';

  if(!isBasico){
    // Pro/Salão: card "Sem preferência" + seleção completa

    html+=`<div class="prof-card${semSel?' sel':''}" onclick="selecionarProf('sem_preferencia')" style="grid-column:1/-1">

  }

  profissionais.forEach(p=>{
    const sel=!isBasico&&profSelecionado&&profSelecionado.id===p.id;
    const fotoHtml=p.foto_url
      ? `<div class="prof-foto" style="width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--c-border,rgba(0,0,0,.12));margin:0 auto 6px">
        <img src="${p.foto_url}" alt="${p.nome}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block">
      </div>`
      : `<div class="prof-dot" style="background:${p.cor||'var(--c-primary)'}"></div>`;
    if(isBasico){
      // Solo: mostra foto mas sem seleção, sem onclick
      html+=`<div class="prof-card" style="cursor:default;pointer-events:none">
        ${fotoHtml}
        <div><div class="prof-nome">${p.nome}</div>${p.especialidade?`<div class="prof-esp">${p.especialidade}</div>`:''}</div>
      </div>`;
    } else {
      html+=`<div class="prof-card${sel?' sel':''}" onclick="selecionarProf('${p.id}')">
        ${fotoHtml}
        <div><div class="prof-nome">${p.nome}</div>${p.especialidade?`<div class="prof-esp">${p.especialidade}</div>`:''}</div>
      </div>`;
    }
  });
  html+='</div>';
  wrap.innerHTML=html;

function buildDias(){
  const w=document.getElementById('diaList');
  w.innerHTML='';
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  for(let i=0;i<60;i++){
    const d=new Date(hoje); d.setDate(hoje.getDate()+i);
    const dom=d.getDay()===0, ds=fmt(d);
    const c=document.createElement('div');
    c.className='dia-card'+(dom?' bl':'')+(S.dataStr===ds?' ativo':'');
    c.innerHTML=`<div class="d-sem">${SEM[d.getDay()]}</div><div class="d-num">${d.getDate()}</div><div class="d-mes">${MESES_C[d.getMonth()]}</div>`;
    const horSalao=window._horarioSalao;
    const diaFechado=horSalao&&horSalao[String(d.getDay())]===null;
    // S7.1/S7.5: Check if date is in a bloqueio period
    const _blks=window._bloqueiosSalao||[];
    const _blk=_blks.find(function(b){return ds>=b.data_ini&&ds<=b.data_fim;});
    const diaBloqueado=!!_blk;
    if(diaFechado){ c.classList.add('fechado'); c.title='Fechado'; }
    else if(diaBloqueado){ c.classList.add('fechado'); c.classList.add('bloqueado'); c.title=_blk.motivo||'Indisponível'; }
    else if(!dom){
      c.onclick=()=>{
        S.dataStr=ds; S.dataLbl=d.getDate()+' de '+MESES[d.getMonth()]; S.hora=null;
        buildDias(); document.getElementById('selDia').textContent=S.dataLbl;
        unlock('bHora'); buildHoras(); scr('bHora');
        updateSteps(); updateBar();
      };
    }
    w.appendChild(c);
    if(S.dataStr===ds) setTimeout(()=>c.scrollIntoView({inline:'center',behavior:'smooth'}),80);
  }
}

async function buildHoras(){
  const w=document.getElementById('horaWrap');
  if(!S.dataStr||!S.srv){w.innerHTML='';return}
  w.innerHTML='<div class="loading">Verificando horários…</div>';
  try{
    let profId=null;
    if(profSelecionado&&profSelecionado!=='sem_preferencia') profId=profSelecionado.id;
    let ocsAll;
    if(profId){
      ocsAll=await supa(`agendamentos?salao_id=eq.${salao.id}&data=eq.${S.dataStr}&status=neq.cancelado&profissional_id=eq.${profId}&select=hora,servicos(duracao)`);
    } else if(profissionais.length>0){
      ocsAll=await supa(`agendamentos?salao_id=eq.${salao.id}&data=eq.${S.dataStr}&status=neq.cancelado&select=hora,profissional_id,servicos(duracao)`);
    } else {
      ocsAll=await supa(`agendamentos?salao_id=eq.${salao.id}&data=eq.${S.dataStr}&status=neq.cancelado&select=hora,servicos(duracao)`);
    }
    const ocs=ocsAll||[];
    ocs.forEach(ag=>{ag.duracao=ag.servicos?.duracao||30;});

    let bloqueados;
    if(profSelecionado==='sem_preferencia'&&profissionais.length>1){
      const bloqPorProf={};
      profissionais.forEach(p=>{bloqPorProf[p.id]=new Set();});
      for(const ag of ocs){
        if(!ag.profissional_id||!bloqPorProf[ag.profissional_id]) continue;
        const[hh,mm]=ag.hora.substring(0,5).split(':').map(Number);
        const ini=hh*60+mm,dur=ag.duracao||30;
        for(let off=0;off<dur;off+=30){
          const sm=ini+off;
          bloqPorProf[ag.profissional_id].add(`${String(Math.floor(sm/60)).padStart(2,'0')}:${String(sm%60).padStart(2,'0')}`);
        }
      }
      const bloqPorSlot={};
      for(const[pid,slots] of Object.entries(bloqPorProf)){
        slots.forEach(s=>{ if(!bloqPorSlot[s]) bloqPorSlot[s]=0; bloqPorSlot[s]++; });
      }
      bloqueados=new Set(Object.entries(bloqPorSlot).filter(([,cnt])=>cnt>=profissionais.length).map(([s])=>s));
    } else {
      bloqueados=new Set();
      for(const ag of ocs){
        const[hh,mm]=ag.hora.substring(0,5).split(':').map(Number);
        const ini=hh*60+mm,dur=ag.duracao||30;
        for(let off=0;off<dur;off+=30){
          const sm=ini+off;
          bloqueados.add(`${String(Math.floor(sm/60)).padStart(2,'0')}:${String(sm%60).padStart(2,'0')}`);
        }
      }
    }

    const horSalao=window._horarioSalao;
    const diaIdx=new Date(S.dataStr+'T12:00:00').getDay();
    const diaCfg=horSalao?horSalao[String(diaIdx)]:null;
    let abreH=8,fechaH=19;
    if(diaCfg&&diaCfg.abre&&diaCfg.fecha){
      const[ah,am]=diaCfg.abre.split(':').map(Number);
      const[fh,fm]=diaCfg.fecha.split(':').map(Number);
      abreH=ah; fechaH=fh+(fm>0?1:0);
    }
    const durSrv=S.srv.duracao||30;
    // Past-slot blocking: if today, block slots that started less than 30min from now
    const agora=new Date();
    // Use LOCAL date (not UTC) to avoid timezone shift blocking wrong day
    const localDate=`${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}-${String(agora.getDate()).padStart(2,'0')}`;
    const isHoje=S.dataStr===localDate;
    const agoraMin=isHoje?(agora.getHours()*60+agora.getMinutes()):0; // no extra buffer — exact current time
    const html2=[];
    for(let h2=abreH;h2<fechaH;h2++){
      for(let m=0;m<60;m+=30){
        const slot=`${String(h2).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        const slotMin=h2*60+m;
        const fim=slotMin+durSrv;
        // Block if: past, ocupado, or end time exceeds closing
        let ocup=bloqueados.has(slot)||(fim>fechaH*60)||(isHoje&&slotMin<agoraMin);
        if(!ocup){
          for(let off=30;off<durSrv;off+=30){
            const sm=slotMin+off;
            const ss=`${String(Math.floor(sm/60)).padStart(2,'0')}:${String(sm%60).padStart(2,'0')}`;
            if(bloqueados.has(ss)){ocup=true;break;}
          }
        }
        const sel=S.hora===slot;
        html2.push(`<button class="h-btn${ocup?' oc':''}${sel?' sel':''}" ${ocup?'disabled':''} onclick="selHora('${slot}')">${slot}</button>`);
      }
    }
    const livres=html2.filter(h=>!h.includes(' oc')).length;
    const urgency=livres>0&&livres<3
      ? '<div style="margin:0 0 10px;padding:8px 12px;background:rgba(255,92,26,.1);border:1px solid rgba(255,92,26,.3);border-radius:8px;font-size:12px;font-weight:700;color:var(--c-primary);text-align:center">⚡ Poucos horários disponíveis!</div>'
      : '';
    const grid=document.createElement('div');
    grid.className='h-grid';
    grid.innerHTML=html2.join('');
    w.innerHTML=''; w.appendChild(grid);
    if(!html2.some(h=>!h.includes('oc')&&!h.includes('disabled'))){
      await buscarProximos();
    }
  }catch(e){
    w.innerHTML=`<div class="erro">Erro: ${e.message}</div>`;
  }
}

// ── PIX EMV copia-e-cola generator (Brazilian Standard BACEN) ──
function gerarPixEMV(chave, tipo, nome, valor, cidade){
  function tlv(id, val){ return id + String(val.length).padStart(2,'0') + val; }
  function clean(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,'').substring(0,25).trim(); }

  // Payload Format Indicator
  var emv = tlv('00','01');
  // Point of Initiation: 12 = dynamic (one-time), 11 = static (reusable)
  emv += tlv('01','12');

  // Merchant Account Info (GUI + chave)
  var gui = tlv('00','br.gov.bcb.pix');
  // Map tipo to key format
  var chaveFormatada = chave.replace(/\D/g,'') ;
  if(tipo==='cpf'||tipo==='cnpj') chaveFormatada = chave.replace(/[^0-9]/g,'');
  else if(tipo==='telefone') chaveFormatada = '+55'+chave.replace(/[^0-9]/g,'');
  else chaveFormatada = chave; // email ou aleatoria: mantém como está
  var keyTag = tlv('01', chaveFormatada);
  // Optional txid for reference
  var txid = tlv('05','***');
  emv += tlv('26', gui + keyTag + txid);

  // MCC (merchant category code) — generic
  emv += tlv('52','0000');
  // Transaction currency — BRL = 986
  emv += tlv('53','986');
  // Transaction amount (optional — omit for any amount)
  if(valor && valor > 0){
    emv += tlv('54', (valor/100).toFixed(2));
  }
  // Country code
  emv += tlv('58','BR');
  // Merchant name (max 25 chars, ASCII only)
  emv += tlv('59', clean(nome).substring(0,25));
  // Merchant city (max 15 chars, ASCII only)
  emv += tlv('60', clean(cidade||'BRASIL').substring(0,15));
  // Additional data — txid reference
  emv += tlv('62', tlv('05','agenda'));
  // CRC16 placeholder — will be replaced
  var crcTag = '6304';
  emv += crcTag;
  // Compute CRC-16/CCITT
  var data = emv;
  var crc = 0xFFFF;
  for(var ci=0;ci<data.length;ci++){
    crc ^= data.charCodeAt(ci) << 8;
    for(var bi=0;bi<8;bi++) crc = (crc & 0x8000) ? ((crc<<1)^0x1021) : (crc<<1);
    crc &= 0xFFFF;
  }
  return emv + crc.toString(16).toUpperCase().padStart(4,'0');
}

function abrirSheet(srvId, profId){
  var cs=document.getElementById('confirmScreen');
  var ap=document.querySelector('.ag-page');
  if(cs&&cs.style.display!=='none'){ cs.style.display='none'; if(ap) ap.style.display='block'; }
  if(srvId && servicos.length>0){
    var sv=servicos.find(function(s){return s.id===srvId;});
    if(sv && (!S.srv||S.srv.id!==srvId)){
      S.srv=sv; S.hora=null;
      buildSrv();
      document.getElementById('selSrv').textContent=sv.icone+' '+sv.nome;
      unlock('bDia'); buildDias();
      updateSteps(); updateBar();
    }
  }
  if(profId && profissionais.length>0){
    var pf=profissionais.find(function(p){return p.id===profId;});
    if(pf){ profSelecionado=pf; buildProf(salao&&salao.plano); }
  }
  var sheet=document.getElementById('sheet');
  var overlay=document.getElementById('sheetOverlay');
  if(sheet) sheet.classList.add('show');
  if(overlay) overlay.classList.add('show');
  document.body.style.overflow='hidden';
  var sb=document.getElementById('sheetBody'); if(sb) sb.scrollTop=0;
}

function fecharSheet(){
  var sheet=document.getElementById('sheet');
  var overlay=document.getElementById('sheetOverlay');
  if(sheet) sheet.classList.remove('show');
  if(overlay) overlay.classList.remove('show');
  document.body.style.overflow='';
}

function compartilhar(){
  var url=window.location.href;
  var nome=salao&&salao.nome||'Agenda';
  var desc=salao&&salao.descricao||'Agende online em segundos!';
  if(navigator.share){
    navigator.share({title:nome,text:desc,url:url}).catch(function(){});
  } else {
    navigator.clipboard&&navigator.clipboard.writeText(url).then(function(){
      toast('Link copiado!');
    }).catch(function(){ toast('Link: '+url); });
  }
}

function _wsHero(){
  var bgImgUrl=salao.foto_capa_url||salao.foto_url||'';
  var bgHtml=bgImgUrl?'<img src="'+bgImgUrl+'" alt="capa">':'';
  var statusHtml='';
  if(salao.horario){
    var now=new Date();
    var cfg=salao.horario[String(now.getDay())];
    if(!cfg){
      statusHtml='<span class="ws-status-dot closed"></span><span class="ws-status-txt">Fechado hoje</span>';
    } else {
      var nowMin=now.getHours()*60+now.getMinutes();
      var iniStr=cfg.ini||cfg.abre||'09:00', fimStr=cfg.fim||cfg.fecha||'19:00';
      var iniP=iniStr.split(':'), fimP=fimStr.split(':');
      var iniMin=+iniP[0]*60+(+iniP[1]||0), fimMin=+fimP[0]*60+(+fimP[1]||0);
      if(nowMin>=iniMin&&nowMin<fimMin){
        statusHtml='<span class="ws-status-dot open"></span><span class="ws-status-txt">Aberto · fecha às '+fimStr+'</span>';
      } else if(nowMin<iniMin){
        statusHtml='<span class="ws-status-dot closed"></span><span class="ws-status-txt">Abre às '+iniStr+'</span>';
      } else {
        statusHtml='<span class="ws-status-dot closed"></span><span class="ws-status-txt">Fechado por hoje</span>';
      }
    }
  }
  var tagHtml=salao.tag_destaque?'<div><span class="ws-tag">'+esc(salao.tag_destaque)+'</span></div>':'';
  var addrHtml=salao.endereco?'<div class="ws-addr">📍 '+esc(salao.endereco)+'</div>':'';
  var statusRow=statusHtml?'<div class="ws-rating"><span style="display:flex;align-items:center;gap:6px">'+statusHtml+'</span></div>':'';
  return '<div class="ws-hero">'+
    '<div class="ws-hero-bg">'+bgHtml+'</div>'+
    '<div class="ws-hero-overlay"></div>'+
    '<div class="ws-hero-content">'+
      tagHtml+
      '<div class="ws-name">'+esc(salao.nome)+'</div>'+
      addrHtml+
      '<div id="heroStars"></div>'+
      statusRow+
    '</div>'+
  '</div>';
}

function _wsContato(){
  var links=[];
  if(salao.whatsapp_url){
    var wa=(salao.whatsapp_url||'').replace(/\D/g,'');
    if(wa) links.push({ico:'📱',label:'WhatsApp',value:'+'+wa,href:'https://wa.me/'+wa});
  }
  if(salao.instagram_url){
    var igUrl=salao.instagram_url.startsWith('http')?salao.instagram_url:'https://instagram.com/'+salao.instagram_url;
    var igVal=salao.instagram_url.replace(/^https?:\/\/(www\.)?instagram\.com\//,'').replace(/\/$/,'');
    links.push({ico:'📸',label:'Instagram',value:'@'+igVal,href:igUrl});
  }
  if(salao.tiktok_url){
    var ttUrl=salao.tiktok_url.startsWith('http')?salao.tiktok_url:'https://tiktok.com/'+salao.tiktok_url;
    links.push({ico:'🎵',label:'TikTok',value:salao.tiktok_url.replace(/^https?:\/\/(www\.)?tiktok\.com\//,'').replace(/\/$/,''),href:ttUrl});
  }
  if(salao.facebook_url){
    var fbUrl=salao.facebook_url.startsWith('http')?salao.facebook_url:'https://facebook.com/'+salao.facebook_url;
    links.push({ico:'👥',label:'Facebook',value:salao.facebook_url.replace(/^https?:\/\/(www\.)?facebook\.com\//,'').replace(/\/$/,''),href:fbUrl});
  }
  if(salao.website_url){
    var wsUrl=salao.website_url.startsWith('http')?salao.website_url:'https://'+salao.website_url;
    links.push({ico:'🌐',label:'Site',value:salao.website_url.replace(/^https?:\/\//,''),href:wsUrl});
  }
  if(!links.length) return '';
  var cards=links.map(function(l){
    return '<a href="'+l.href+'" target="_blank" rel="noopener" class="contato-card">'+
      '<div class="contato-ico">'+l.ico+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="contato-label">'+l.label+'</div>'+
        '<div class="contato-value">'+esc(l.value)+'</div>'+
      '</div>'+
      '<div class="contato-arrow">→</div>'+
    '</a>';
  }).join('');
  return '<div class="ws-section-wrap"><section class="ws-section">'+
    '<div class="ws-section-title">Contato & Redes</div>'+
    '<div class="contato-cards">'+cards+'</div>'+
  '</section></div>';
}

function abrirLightbox(idx){
  var fotos=window._galeriaFotos||[];
  if(!fotos.length) return;
  var i=Math.min(Math.max(idx,0),fotos.length-1);
  var el=document.createElement('div');
  el.className='galeria-lightbox';
  el.innerHTML='<img src="'+fotos[i]+'" alt="foto '+(i+1)+'" onclick="event.stopPropagation()">'+
    '<button class="galeria-lightbox-close" onclick="this.parentNode.remove()">✕</button>';
  el.onclick=function(){el.remove();};
  document.body.appendChild(el);
}

function _renderStatusBar(){
  var el=document.getElementById('statusBar'); if(!el) return;
  var h=salao.horario;
  if(!h){el.style.display='none';return;}
  var now=new Date();
  var cfg=h[String(now.getDay())];
  if(!cfg){el.innerHTML='<span class="status-closed">🔴 Fechado hoje</span>';el.style.display='flex';return;}
  var nowMin=now.getHours()*60+now.getMinutes();
  var iniStr=cfg.ini||cfg.abre||'09:00', fimStr=cfg.fim||cfg.fecha||'19:00';
  var ap=iniStr.split(':').map(Number), fp=fimStr.split(':').map(Number);
  var abreMin=ap[0]*60+(ap[1]||0), fechaMin=fp[0]*60+(fp[1]||0);
  if(nowMin>=abreMin&&nowMin<fechaMin){
    el.innerHTML='<span class="status-open">🟢 Aberto agora</span><span style="font-size:11px;color:var(--c-text-3);font-weight:400">· Fecha às '+fimStr+'</span>';
  } else if(nowMin<abreMin){
    el.innerHTML='<span class="status-closed">🔴 Fechado</span><span style="font-size:11px;color:var(--c-text-3);font-weight:400">· Abre às '+iniStr+'</span>';
  } else {
    el.innerHTML='<span class="status-closed">🔴 Fechado por hoje</span>';
  }
  el.style.display='flex';
}

async function carregarAvaliacoes(){
  var sec=document.getElementById('secAvaliacoes');
  var el=document.getElementById('avaliacoesContent');
  if(!sec||!el||!salao) return;
  try{
    var avs=await supa('avaliacoes?salao_id=eq.'+salao.id+'&respondido_em=not.is.null&nota=not.is.null&order=respondido_em.desc&limit=10&select=nota,comentario,respondido_em');
    if(!avs||avs.length===0){sec.style.display='none';return;}
    var soma=avs.reduce(function(s,a){return s+(a.nota||0);},0);
    var avg=(soma/avs.length).toFixed(1);
    var nStars=function(n){var s='';for(var i=0;i<Math.round(n);i++)s+='⭐';return s;};
    var html='<div class="avg-rating">'+
      '<div class="avg-num">'+avg+'</div>'+
      '<div><div class="avg-stars">'+nStars(Math.round(parseFloat(avg)))+'</div>'+
      '<div class="avg-total">'+avs.length+' avaliação'+(avs.length!==1?'s':'')+'</div></div>'+
    '</div><div class="reviews-list">';
    avs.slice(0,3).forEach(function(a){
      var data=a.respondido_em?new Date(a.respondido_em).toLocaleDateString('pt-BR',{month:'short',year:'numeric'}):'';
      html+='<div class="review-card">'+
        '<div class="review-stars">'+nStars(a.nota)+'</div>'+
        (a.comentario?'<div class="review-text">'+esc(a.comentario)+'</div>':'')+
        '<div class="review-author">'+data+'</div>'+
      '</div>';
    });
    html+='</div>';
    var hs=document.getElementById('heroStars');
    if(hs) hs.innerHTML='<span style="color:#F59E0B;font-size:13px">'+nStars(Math.round(parseFloat(avg)))+'</span>'+
      ' <strong style="font-size:13px;color:var(--c-text)">'+avg+'</strong>'+
      ' <span style="font-size:12px;color:var(--c-text-3)">('+avs.length+')</span>';
    el.innerHTML=html;
    sec.style.display='';
  }catch(e){sec.style.display='none';}
}

// ═══ CART ═══
var _cart=[];
function cartAdd(prod){
  var found=_cart.find(function(i){return i.id===prod.id;});
  if(found){ found.qty++; } else { _cart.push({id:prod.id,nome:prod.nome,preco:prod.preco,foto_url:prod.foto_url||null,icone:prod.icone||'📦',qty:1}); }
  _cartSync();
  toast('Adicionado ao carrinho!');
}
function cartRemove(id){
  _cart=_cart.filter(function(i){return i.id!==id;});
  _cartSync();
  _renderCartContent();
}
function cartQty(id,delta){
  var found=_cart.find(function(i){return i.id===id;});
  if(!found) return;
  found.qty=Math.max(0,found.qty+delta);
  if(found.qty===0) _cart=_cart.filter(function(i){return i.id!==id;});
  _cartSync();
  _renderCartContent();
}
function _cartSync(){
  var total=_cart.reduce(function(s,i){return s+i.qty;},0);
  var fab=document.getElementById('cartFab');
  var badge=document.getElementById('cartBadge');
  var lbl=document.getElementById('cartFabLabel');
  if(badge) badge.textContent=total;
  if(fab){ if(total>0) fab.classList.add('show'); else fab.classList.remove('show'); }
  if(lbl) lbl.textContent=total>0?'Carrinho':'Carrinho';
}
function abrirCarrinho(){
  _renderCartContent();
  var s=document.getElementById('cartSheet');
  var o=document.getElementById('cartOverlay');
  if(s) s.classList.add('show');
  if(o) o.classList.add('show');
  document.body.style.overflow='hidden';
}
function fecharCarrinho(){
  var s=document.getElementById('cartSheet');
  var o=document.getElementById('cartOverlay');
  if(s) s.classList.remove('show');
  if(o) o.classList.remove('show');
  document.body.style.overflow='';
}
function _renderCartContent(){
  var el=document.getElementById('cartContent');
  if(!el) return;
  if(!_cart.length){
    el.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--c-text-3)"><div style="font-size:48px;margin-bottom:12px">🛒</div><div style="font-size:15px;font-weight:600">Seu carrinho está vazio</div><div style="font-size:13px;margin-top:6px">Adicione produtos para continuar</div></div>';
    return;
  }
  var total=_cart.reduce(function(s,i){return s+i.preco*i.qty;},0);
  var items=_cart.map(function(i){
    var fotoHtml=i.foto_url
      ?'<div class="cart-item-foto"><img src="'+i.foto_url+'" alt="'+esc(i.nome)+'"></div>'
      :'<div class="cart-item-foto">'+esc(i.icone)+'</div>';
    return '<div class="cart-item">'+
      fotoHtml+
      '<div class="cart-item-info">'+
        '<div class="cart-item-nome">'+esc(i.nome)+'</div>'+
        '<div class="cart-item-preco">R$ '+(i.preco/100).toFixed(2).replace('.',',')+'</div>'+
      '</div>'+
      '<div class="cart-qty">'+
        '<button class="cart-qty-btn" onclick="cartQty(\''+i.id+'\',-1)">−</button>'+
        '<span class="cart-qty-num">'+i.qty+'</span>'+
        '<button class="cart-qty-btn" onclick="cartQty(\''+i.id+'\',1)">+</button>'+
      '</div>'+
    '</div>';
  }).join('');
  var totalFmt='R$ '+(total/100).toFixed(2).replace('.',',');
  el.innerHTML='<div style="padding:16px">'+
    items+
    '<div class="cart-total-row">'+
      '<span class="cart-total-lbl">Total</span>'+
      '<span class="cart-total-val">'+totalFmt+'</span>'+
    '</div>'+
    '<div style="margin-top:16px;font-size:12px;color:var(--c-text-3);text-align:center;margin-bottom:12px">💳 Pagamento realizado no estabelecimento</div>'+
    '<button onclick="cartFinalizar()" class="btn-cta" style="margin-top:4px">Finalizar pedido</button>'+
  '</div>';
}
function cartFinalizar(){
  if(!_cart.length) return;
  var items=_cart.map(function(i){return i.qty+'x '+i.nome;}).join('\n');
  var total=_cart.reduce(function(s,i){return s+i.preco*i.qty;},0);
  var totalFmt='R$ '+(total/100).toFixed(2).replace('.',',');
  var wa=(salao.whatsapp_url||'').replace(/\D/g,'');
  var msg=encodeURIComponent('Olá, gostaria de reservar os produtos:\n\n'+items+'\n\nTotal: '+totalFmt+'\n\nPagamento no estabelecimento.');
  if(wa){ window.open('https://wa.me/'+wa+'?text='+msg,'_blank'); }
  else { toast('Pedido: '+items+' · '+totalFmt); }
}

function wsNavTo(id){
  var el=document.getElementById(id);
  if(!el) return;
  var offset=el.getBoundingClientRect().top+window.scrollY-110;
  window.scrollTo({top:Math.max(0,offset),behavior:'smooth'});
}
