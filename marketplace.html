<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marketplace — AgendaTop</title>
<meta name="description" content="Encontre salões e estabelecimentos perto de você. Agende online em segundos.">
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:rgba(255,255,255,.08);
  --tx:#f0f0f0;--tx2:rgba(255,255,255,.6);--tx3:rgba(255,255,255,.35);
  --accent:#E55A0C;--accent2:#ff7a35;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

.top-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;gap:16px;
}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px;white-space:nowrap}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--surface2);border:1px solid var(--border);border-radius:40px;
  color:var(--tx);font-size:14px;transition:border-color .15s;
}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--tx3)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.btn-mapa-geral{
  display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:40px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--tx2);font-size:13px;font-weight:600;white-space:nowrap;
  transition:background .15s,color .15s;
}
.btn-mapa-geral:hover,.btn-mapa-geral.ativo{background:rgba(229,90,12,.12);color:var(--accent);border-color:rgba(229,90,12,.3)}

.hero{
  padding:48px 20px 28px;text-align:center;
  background:linear-gradient(180deg,rgba(229,90,12,.06) 0%,transparent 100%);
}
.hero h1{font-size:clamp(22px,5vw,38px);font-weight:800;letter-spacing:-.5px;margin-bottom:10px;line-height:1.2}
.hero h1 span{color:var(--accent)}
.hero p{font-size:15px;color:var(--tx2);max-width:480px;margin:0 auto}

.filtros{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.chip{
  padding:7px 14px;border-radius:40px;border:1px solid var(--border);
  background:transparent;color:var(--tx2);font-size:13px;font-weight:600;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.chip:hover{background:var(--surface2);color:var(--tx)}
.chip.ativo{background:var(--accent);border-color:var(--accent);color:#fff}

.container{max-width:1200px;margin:0 auto;padding:0 16px 64px}
.section-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;padding:0 4px}

#mapa-section{display:none;margin-bottom:24px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
#mapa-frame{width:100%;height:380px;border:0;display:block}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:transform .15s,border-color .15s;display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-2px);border-color:rgba(229,90,12,.25)}
.card-capa{position:relative;height:140px;background:linear-gradient(135deg,#1e1e1e,#2a2a2a);overflow:hidden}
.card-capa img{width:100%;height:100%;object-fit:cover;display:block}
.card-capa-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px}
.tag-destaque{
  position:absolute;top:10px;left:10px;
  background:var(--accent);color:#fff;font-size:10px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;
}
.rating-badge{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  color:#fff;font-size:12px;font-weight:700;padding:4px 8px;border-radius:20px;
}
.card-body{padding:14px 14px 0;flex:1;display:flex;flex-direction:column;gap:5px}
.card-nome{font-size:15px;font-weight:700;line-height:1.3}
.card-sub{font-size:12px;color:var(--tx2)}
.card-desc{font-size:12px;color:var(--tx3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-end{font-size:12px;color:var(--tx3);display:flex;align-items:flex-start;gap:4px;margin-top:2px}
.card-actions{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px 14px 14px}
.btn-agendar{
  display:block;text-align:center;padding:10px 0;border-radius:10px;
  background:var(--accent);color:#fff;font-size:13px;font-weight:700;
  transition:background .15s;
}
.btn-agendar:hover{background:var(--accent2)}
.btn-map{
  width:42px;height:42px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:background .15s;text-decoration:none;
}
.btn-map:hover{background:rgba(229,90,12,.12)}

.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty .ico{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

.loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.skel{height:280px;background:var(--surface);border-radius:var(--radius);position:relative;overflow:hidden}
.skel::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

@media(max-width:600px){
  .btn-mapa-geral .label{display:none}
  .hero{padding:32px 16px 20px}
  .grid{grid-template-columns:1fr 1fr}
  .card-capa{height:110px}
  .card-capa-placeholder{font-size:36px}
  #mapa-frame{height:300px}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">Agenda<span>Top</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar salão, categoria, cidade…" oninput="filtrar()">
  </div>
  <button class="btn-mapa-geral" id="btnMapa" onclick="toggleMapa()">
    <span>🗺️</span><span class="label">Ver no mapa</span>
  </button>
</div>

<div class="hero">
  <h1>Encontre e agende<br><span>perto de você</span></h1>
  <p>Salões, barbearias, clínicas e muito mais — agendamento online em segundos</p>
</div>

<div class="filtros">
  <button class="chip ativo" onclick="setCategoria('',this)">Todos</button>
  <button class="chip" onclick="setCategoria('barbearia',this)">💈 Barbearia</button>
  <button class="chip" onclick="setCategoria('beleza',this)">✂️ Beleza</button>
  <button class="chip" onclick="setCategoria('saude',this)">🏥 Saúde</button>
  <button class="chip" onclick="setCategoria('estetica',this)">💆 Estética</button>
  <button class="chip" onclick="setCategoria('fitness',this)">💪 Fitness</button>
  <button class="chip" onclick="setCategoria('pet',this)">🐾 Pet</button>
</div>

<div class="container">
  <div id="mapa-section">
    <iframe id="mapa-frame" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
  <div class="section-label" id="result-label">Carregando…</div>
  <div class="loading-grid" id="grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<script>
var SUPA='https://acldrisohnjfekjxgmoh.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjbGRyaXNvaG5qZmVranhnbW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODA1MzcsImV4cCI6MjA4OTE1NjUzN30.etojz12x1oVNvbW_fPeVpNx2OFuJ72C1YioFBlCLS2Y';
var CATS={barbearia:'💈',beleza:'✂️',saude:'🏥',estetica:'💆',fitness:'💪',pet:'🐾'};

var todosOsSaloes=[];
var catFiltro='';
var mapaAberto=false;

async function carregar(){
  try{
    var r=await fetch(
      SUPA+'/rest/v1/saloes?marketplace_enabled=eq.true&deleted_at=is.null&status=in.(ativo,trial)'+
      '&select=id,slug,nome,categoria,cidade,endereco,descricao,foto_url,foto_capa_url,nota_media,total_avaliacoes,tag_destaque'+
      '&order=tag_destaque.desc.nullslast,nota_media.desc.nullslast,nome.asc',
      {headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}
    );
    todosOsSaloes=r.ok?await r.json():[];
  }catch(e){todosOsSaloes=[];}
  filtrar();
}

function setCategoria(cat,el){
  catFiltro=cat;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('ativo');});
  el.classList.add('ativo');
  filtrar();
}

function getLista(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  return todosOsSaloes.filter(function(s){
    if(catFiltro&&s.categoria!==catFiltro) return false;
    if(!q) return true;
    return (s.nome||'').toLowerCase().includes(q)||
           (s.categoria||'').toLowerCase().includes(q)||
           (s.cidade||'').toLowerCase().includes(q)||
           (s.endereco||'').toLowerCase().includes(q)||
           (s.descricao||'').toLowerCase().includes(q);
  });
}

function filtrar(){
  var lista=getLista();
  renderGrid(lista);
  if(mapaAberto) atualizarMapa(lista);
}

function renderGrid(lista){
  var label=document.getElementById('result-label');
  var grid=document.getElementById('grid');
  label.textContent=lista.length===0?'Nenhum resultado':lista.length+' estabelecimento'+(lista.length===1?'':'s');
  grid.className='grid';
  if(lista.length===0){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ico">🔍</div><p>Nenhum estabelecimento encontrado.<br>Tente outra busca ou categoria.</p></div>';
    return;
  }
  grid.innerHTML=lista.map(cardHtml).join('');
}

function cardHtml(s){
  var ico=CATS[s.categoria]||'🏪';
  var capa=s.foto_capa_url||s.foto_url;
  var capaHtml=capa
    ?'<img src="'+esc(capa)+'" alt="'+esc(s.nome)+'" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=card-capa-placeholder>'+ico+'</div>\'">'
    :'<div class="card-capa-placeholder">'+ico+'</div>';
  var nota=(s.nota_media&&s.total_avaliacoes)
    ?'<div class="rating-badge">⭐ '+(+s.nota_media).toFixed(1)+'</div>':'';
  var tag=s.tag_destaque?'<div class="tag-destaque">'+esc(s.tag_destaque)+'</div>':'';
  var subParts=[];
  if(s.categoria) subParts.push(ico+' '+cap(s.categoria));
  if(s.cidade) subParts.push(s.cidade);
  var sub=subParts.join(' · ');
  var endHtml=s.endereco
    ?'<a class="card-end" href="https://maps.google.com/maps?q='+encodeURIComponent(s.nome+', '+s.endereco)+'" target="_blank" rel="noopener"><span>📍</span><span>'+esc(s.endereco)+'</span></a>'
    :'';
  var mapBtn=s.endereco
    ?'<a class="btn-map" href="https://maps.google.com/maps?q='+encodeURIComponent(s.nome+', '+s.endereco)+'" target="_blank" rel="noopener" title="Ver no mapa">📍</a>'
    :'';
  return '<div class="card">'+
    '<div class="card-capa">'+capaHtml+tag+nota+'</div>'+
    '<div class="card-body">'+
      '<div class="card-nome">'+esc(s.nome)+'</div>'+
      (sub?'<div class="card-sub">'+esc(sub)+'</div>':'')+
      (s.descricao?'<div class="card-desc">'+esc(s.descricao)+'</div>':'')+
      endHtml+
    '</div>'+
    '<div class="card-actions">'+
      '<a class="btn-agendar" href="/agendar.html?s='+encodeURIComponent(s.slug)+'">Agendar agora</a>'+
      mapBtn+
    '</div>'+
  '</div>';
}

function toggleMapa(){
  mapaAberto=!mapaAberto;
  var sec=document.getElementById('mapa-section');
  var btn=document.getElementById('btnMapa');
  sec.style.display=mapaAberto?'block':'none';
  btn.classList.toggle('ativo',mapaAberto);
  if(mapaAberto) atualizarMapa(getLista());
}

function atualizarMapa(lista){
  var frame=document.getElementById('mapa-frame');
  var comEnd=lista.filter(function(s){return s.endereco||s.cidade;});
  var q;
  if(comEnd.length===0){
    q='salões+de+beleza';
  } else if(comEnd.length===1){
    q=encodeURIComponent(comEnd[0].nome+' '+(comEnd[0].endereco||comEnd[0].cidade||''));
  } else {
    var cidade=comEnd.find(function(s){return s.cidade;});
    q='salões+de+beleza'+(cidade?'+'+encodeURIComponent(cidade.cidade):'');
  }
  frame.src='https://maps.google.com/maps?q='+q+'&output=embed&z=13';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):s}

carregar();
</script>
</body>
</html>
