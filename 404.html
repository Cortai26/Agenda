<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Página não encontrada — Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow-x:hidden;font-family:'Nunito',sans-serif;background:#FFF4E6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.ico{font-size:64px;margin-bottom:16px}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#2B1A0E;margin-bottom:8px;text-align:center}
p{font-size:15px;color:#8C7B6B;font-weight:600;margin-bottom:32px;text-align:center;line-height:1.6}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
a{padding:13px 24px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;text-decoration:none;transition:.15s}
.btn-p{background:#FF5C1A;color:#fff}
.btn-s{background:#F0E0C8;color:#2B1A0E}

.wordmark{font-family:'Sora',sans-serif;font-weight:800;letter-spacing:-.04em;color:var(--text,#1D1D1F);display:inline-flex;align-items:baseline;line-height:1}
.wm-dot{display:inline-block;width:.2em;height:.2em;border-radius:50%;background:#E55A0C;margin-left:2px;position:relative;top:-.52em;flex-shrink:0}
.brand-lockup{display:inline-flex;align-items:center;gap:10px;text-decoration:none}
</style>
</head>
<body>
<div class="ico">✂️</div>
<h1>Página não encontrada</h1>
<p>O link que você acessou não existe.<br>Verifique o endereço ou volte ao início.</p>
<div class="btns">
  <a href="/index.html" class="btn-p">Ir para o início</a>
  <a href="/painel.html" class="btn-s">Acessar meu painel</a>
</div>
</body>
</html>
