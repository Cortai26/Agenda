<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="pageTitle">Meus agendamentos</title>
<meta name="theme-color" content="#E55A0C">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS (padrão Onyx) ── */
:root {
  --ink:#0A0908; --ink-2:#111009; --bone:#F0EDE8;
  --stone:#A09890; --stone-2:#6A6462;
  --brand:#E55A0C; --ok:#22C55E; --err:#EF4444;
  --rule:rgba(240,237,232,0.06); --rule-2:rgba(240,237,232,0.14);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Manrope',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
/* Temas do estabelecimento */
html.t-neutral { --ink:#F5F2EC; --ink-2:#FFF; --bone:#1A0E06; --stone:#5A4030; --rule:rgba(26,14,6,0.07); --rule-2:rgba(26,14,6,0.12); }
html.t-feminine { --ink:#FBF5F7; --ink-2:#FFF; --bone:#1A0613; --stone:#5A1A35; --brand:#D81B60; --rule:rgba(216,27,96,0.08); --rule-2:rgba(216,27,96,0.14); }
html.t-clinic { --ink:#F2F6F9; --ink-2:#FFF; --bone:#0E2A45; --stone:#2A5070; --brand:#2C6FAA; --rule:rgba(44,111,170,0.08); --rule-2:rgba(44,111,170,0.14); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--bone);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}

.nav{height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--rule);background:rgba(10,9,8,0.94);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50}
html.t-neutral .nav,html.t-feminine .nav,html.t-clinic .nav{background:rgba(255,255,255,0.94)}
.nav-logo{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--bone);text-decoration:none}
.nav-salao{font-size:12px;color:var(--stone)}

.wrap{max-width:520px;margin:0 auto;padding:32px 20px 80px}

/* Tela de busca */
.busca-card{text-align:center;padding:40px 0}
.busca-eyebrow{font-size:9px;color:rgba(229,90,12,0.6);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.busca-h1{font-family:var(--serif);font-style:italic;font-size:32px;color:var(--bone);letter-spacing:-0.8px;margin-bottom:6px}
.busca-sub{font-size:13px;color:var(--stone);margin-bottom:28px;line-height:1.6;font-weight:300}
.busca-field{position:relative;margin-bottom:12px}
.busca-input{width:100%;padding:14px 0;background:transparent;border:none;border-bottom:2px solid var(--rule-2);color:var(--bone);font-size:18px;font-family:var(--serif);font-style:italic;outline:none;transition:border-color 0.15s;text-align:center}
.busca-input:focus{border-color:var(--brand)}
.busca-input::placeholder{color:var(--stone-2);font-style:italic}
.btn-buscar{width:100%;padding:15px;background:var(--brand);color:var(--bone);border:none;font-family:var(--serif);font-style:italic;font-size:17px;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.15s}
.btn-buscar:active{background:#C04A08}

/* Cards de agendamento */
.resultado-header{margin-bottom:20px}
.resultado-nome{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--bone);margin-bottom:4px}
.resultado-sub{font-size:12px;color:var(--stone)}

.ag-card{background:var(--ink-2);border:1px solid var(--rule-2);padding:16px 18px;margin-bottom:10px;position:relative}
.ag-card.futuro{border-color:rgba(229,90,12,0.25)}
.ag-card.passado{opacity:0.6}
.ag-card.cancelado{opacity:0.4}
.ag-status{position:absolute;top:14px;right:16px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:var(--sans);font-weight:600}
.ag-status.pendente{color:var(--brand)}
.ag-status.concluido{color:var(--ok)}
.ag-status.cancelado{color:var(--stone-2)}
.ag-data{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--bone);margin-bottom:3px}
.ag-svc{font-size:14px;color:var(--stone);margin-bottom:8px}
.ag-prof{font-size:12px;color:var(--stone-2)}
.ag-preco{font-family:var(--mono);font-size:13px;color:var(--brand);margin-top:6px}
.ag-acoes{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-ag-acao{padding:8px 14px;border:1px solid var(--rule-2);background:transparent;color:var(--stone);font-size:12px;font-family:var(--serif);font-style:italic;cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.15s}
.btn-ag-acao:hover{border-color:var(--bone);color:var(--bone)}
.btn-ag-acao.reagendar{border-color:rgba(229,90,12,0.3);color:var(--brand)}
.btn-ag-acao.cancelar{border-color:rgba(239,68,68,0.2);color:var(--err)}

.empty-state{text-align:center;padding:40px 0;color:var(--stone);font-family:var(--serif);font-style:italic;font-size:18px}
.btn-novo{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--brand);color:var(--bone);text-decoration:none;font-family:var(--serif);font-style:italic;font-size:17px;margin-top:20px;transition:background 0.15s}
.btn-novo:active{background:#C04A08}
</style>
</head>
<body>

<nav class="nav">
  <a href="#" class="nav-logo" id="navLogo">Agenda<span style="color:var(--brand)">.</span></a>
  <span class="nav-salao" id="navSalao"></span>
</nav>

<div class="wrap">

  <!-- Estado: busca pelo número -->
  <div id="estadoBusca" class="busca-card">
    <div class="busca-eyebrow">Meus agendamentos</div>
    <h1 class="busca-h1" id="buscaH1">Encontre seus<br>agendamentos.</h1>
    <p class="busca-sub" id="buscaSub">Digite o número de WhatsApp que você usou ao agendar.</p>
    <div class="busca-field">
      <input type="tel" id="inpTelBusca" class="busca-input"
        placeholder="(11) 99999-9999"
        oninput="mascaraTel(this)"
        onkeydown="if(event.key==='Enter')buscar()">
    </div>
    <button class="btn-buscar" onclick="buscar()" id="btnBuscar">
      Buscar meus agendamentos
    </button>
  </div>

  <!-- Estado: resultados -->
  <div id="estadoResultados" style="display:none">
    <div class="resultado-header">
      <div class="resultado-nome" id="resNome"></div>
      <div class="resultado-sub" id="resSub"></div>
    </div>
    <div id="listaAgs"></div>
    <a id="linkNovoAg" href="#" class="btn-novo">
      <span>Agendar novamente</span><span>→</span>
    </a>
    <button onclick="voltarBusca()" style="width:100%;padding:12px;background:transparent;border:1px solid var(--rule-2);color:var(--stone);font-family:var(--serif);font-style:italic;font-size:14px;cursor:pointer;margin-top:8px">
      ← Buscar outro número
    </button>
  </div>

</div>

<script>
const SUPA_URL = 'https://acldrisohnjfekjxgmoh.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjbGRyaXNvaG5qZmVranhnbW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODA1MzcsImV4cCI6MjA4OTE1NjUzN30.etojz12x1oVNvbW_fPeVpNx2OFuJ72C1YioFBlCLS2Y';
const H = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` };
const SLUG = new URLSearchParams(location.search).get('slug');

let _salao = null;

async function init() {
  if (!SLUG) return;

  const r = await fetch(`${SUPA_URL}/rest/v1/saloes?slug=eq.${SLUG}&select=id,nome,slug,tema,fonte,categoria,cidade`, { headers: H });
  const [s] = await r.json();
  _salao = s;
  if (!s) return;

  /* Aplicar TEMA do estabelecimento */
  const temaId = s.tema?.id || s.tema?.template || 'onyx';
  const mapaClasse = { neutral:'t-neutral', feminine:'t-feminine', clinic:'t-clinic' };
  if (mapaClasse[temaId]) document.documentElement.classList.add(mapaClasse[temaId]);

  /* Atualizar nav e título */
  document.getElementById('navSalao').textContent = s.nome;
  document.getElementById('navLogo').href = `/agendar.html?slug=${SLUG}`;
  document.title = `Meus agendamentos — ${s.nome}`;

  /* Personalizar texto da busca */
  document.getElementById('buscaH1').innerHTML = `Seus agendamentos<br>com ${s.nome}.`;

  /* Link de novo agendamento */
  document.getElementById('linkNovoAg').href = `/agendar.html?slug=${SLUG}`;
}

async function buscar() {
  const tel = document.getElementById('inpTelBusca').value.replace(/\D/g,'');
  if (tel.length < 10) { alert('Digite um número válido com DDD.'); return; }

  const btn = document.getElementById('btnBuscar');
  btn.textContent = 'Buscando...';

  let url = `${SUPA_URL}/rest/v1/agendamentos?cliente_tel=eq.${tel}&order=data.desc,hora.desc&limit=20&select=id,data,hora,servico_nome,servico_preco,profissional_nome,status,cancel_token`;
  if (_salao) url += `&salao_id=eq.${_salao.id}`;

  const r = await fetch(url, { headers: H });
  const ags = await r.json();

  btn.textContent = 'Buscar meus agendamentos';

  if (!ags?.length) {
    document.getElementById('listaAgs').innerHTML =
      `<div class="empty-state">Nenhum agendamento encontrado<br>para este número.</div>`;
  } else {
    const nome = ags[0]?.cliente_nome || 'Olá!';
    document.getElementById('resNome').textContent = nome;
    document.getElementById('resSub').textContent =
      `${ags.length} agendamento${ags.length > 1 ? 's' : ''} encontrado${ags.length > 1 ? 's' : ''}`;
    document.getElementById('listaAgs').innerHTML = ags.map(ag => htmlAg(ag)).join('');
  }

  document.getElementById('estadoBusca').style.display = 'none';
  document.getElementById('estadoResultados').style.display = 'block';
}

function htmlAg(ag) {
  const hoje = new Date().toISOString().split('T')[0];
  const futuro = ag.data >= hoje && ag.status !== 'cancelado';
  const fmtData = new Date(ag.data + 'T12:00:00').toLocaleDateString('pt-BR',{ weekday:'long', day:'2-digit', month:'long' });
  const preco = ag.servico_preco > 0
    ? (ag.servico_preco/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
    : null;

  const statusLabel = { pendente:'Confirmado', concluido:'Concluído', cancelado:'Cancelado' }[ag.status] || ag.status;
  const cancelUrl = `/cancelar.html?token=${ag.cancel_token}`;
  const reagendarUrl = `/reagendar.html?token=${ag.cancel_token}`;

  return `
  <div class="ag-card ${futuro?'futuro':ag.status}">
    <span class="ag-status ${ag.status}">${statusLabel}</span>
    <div class="ag-data">${ag.hora?.slice(0,5)} · ${fmtData}</div>
    <div class="ag-svc">${ag.servico_nome}</div>
    ${ag.profissional_nome ? `<div class="ag-prof">com ${ag.profissional_nome}</div>` : ''}
    ${preco ? `<div class="ag-preco">${preco}</div>` : ''}
    ${futuro ? `
    <div class="ag-acoes">
      <a href="${reagendarUrl}" class="btn-ag-acao reagendar">🔁 Reagendar</a>
      <a href="${cancelUrl}" class="btn-ag-acao cancelar">✕ Cancelar</a>
    </div>` : ''}
  </div>`;
}

function voltarBusca() {
  document.getElementById('estadoBusca').style.display = 'block';
  document.getElementById('estadoResultados').style.display = 'none';
  document.getElementById('inpTelBusca').value = '';
}
window.buscar = buscar;
window.voltarBusca = voltarBusca;

function mascaraTel(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3');
  else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/,'($1) $2-$3');
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})$/,'($1) $2');
  el.value = v;
}
window.mascaraTel = mascaraTel;

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
