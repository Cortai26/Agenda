<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Admin — Agenda</title>
<meta name="description" content="Painel administrativo Agenda.">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=30">
<link rel="apple-touch-icon" href="/icon-192.png?v=30">
<link rel="manifest" href="/manifest-admin.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Nunito+Sans:wght@300;400;600&family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/tokens.css">
<style>
/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--font-b)}

/* ═══ APP SHELL — position:fixed = viewport-relative, immune to body height ═══ */
.app{display:none;position:fixed;inset:0;z-index:1}
.app.show{display:flex;flex-direction:column}

/* ═══ INNER LAYOUT ═══ */
.adm-main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.adm-topbar{background:var(--topbar-bg);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.mobile-tabs{display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--topbar-bg);border-bottom:1px solid var(--bd)}
.mobile-tabs::-webkit-scrollbar{display:none}
.adm-content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;padding:14px 14px 32px;-webkit-overflow-scrolling:touch}
.adm-sidebar{display:none;width:220px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);flex-direction:column;padding:28px 0 20px;overflow-y:auto;scrollbar-width:none}
.adm-sidebar::-webkit-scrollbar{display:none}

/* ═══ RESPONSIVE — mobile first, sidebar appears at 1024px+ ═══ */
@media(max-width:380px){
  .adm-content{padding:10px 10px 24px}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .kpi-value{font-size:20px}
}


/* Mobile table: hide Vencimento column */
.adm-table th:nth-child(4),
.adm-table td:nth-child(4){display:none}
/* Compact actions on mobile */
.adm-table .t-actions{font-size:14px;padding:2px 4px}
/* Tighter name column */
.t-biz-name{font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-biz-loc{font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-biz-icon{width:28px;height:28px;font-size:13px;flex-shrink:0}

@media(min-width:1024px){
  .app.show{flex-direction:row}
  .adm-table th:nth-child(4),.adm-table td:nth-child(4){display:table-cell}
  .t-biz-name{max-width:none;white-space:normal}
  .t-biz-loc{max-width:none;white-space:normal}
  .t-biz-icon{width:36px;height:36px;font-size:16px}

  .adm-sidebar{display:flex}
  .mobile-tabs{display:none!important}
  .adm-topbar{padding:14px 24px}
  .adm-page-title{font-size:20px}
  .adm-content{padding:24px 28px 40px}
  .kpi-grid{grid-template-columns:repeat(3,1fr);gap:16px}
  .kpi-value{font-size:26px}
  
  .adm-2col-side{display:flex;flex-direction:column;gap:14px}
}

@media(min-width:1440px){
  .adm-sidebar{width:240px}
  .adm-content{padding:28px 40px 60px}
  .kpi-grid{grid-template-columns:repeat(4,1fr);gap:20px}
  .kpi-value{font-size:32px}
  .adm-2col{grid-template-columns:1fr 320px}
}

@media(min-width:1920px){
  .adm-sidebar{width:260px}
  .adm-content{max-width:1600px;margin:0 auto}
  .kpi-value{font-size:36px}
}



/* ═══════════════════════════════════════════════════════════════
   AGENDA ADMIN — SISTEMA DE TEMAS v2
   t-onyx (dark gold) · t-feminine (pink) · t-neutral (blue)
   ═══════════════════════════════════════════════════════════════ */


/* ══ ONYX — Dark Editorial Gold ══ */
:root,
html.t-onyx {
  --bg:#131313;
  --s1:#181818;
  --s2:#212121;
  --s3:#2C2C2C;
  --bd:rgba(255,255,255,.07);
  --bd2:rgba(255,255,255,.12);
  --primary:#F2CA50;
  --primary-d:#D4AF37;
  --primary-bg:rgba(242,202,80,.1);
  --primary-glow:rgba(242,202,80,.3);
  --tx:#E5E2E1;
  --tx2:#A09080;
  --tx3:#5C5045;
  --green:#4ADE80;
  --green-bg:rgba(74,222,128,.1);
  --red:#F87171;
  --red-bg:rgba(248,113,113,.1);
  --amber:#F59E0B;
  --amber-bg:rgba(245,158,11,.1);
  --blue:#60A5FA;
  --r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  --sh:0 4px 20px rgba(0,0,0,.4);
  --sh-lg:0 8px 40px rgba(0,0,0,.5);
  --font-h:'Manrope',sans-serif;
  --font-b:'Inter',sans-serif;
  --sidebar-w:220px;
  --sidebar-bg:#0E0E0E;
  --sidebar-border:rgba(255,255,255,.05);
  --sidebar-active-bg:rgba(242,202,80,.12);
  --sidebar-active-color:var(--primary);
  --sidebar-text:rgba(255,255,255,.75);
  --sidebar-text-hover:rgba(255,255,255,.8);
  --topbar-bg:#131313;
  --card-bg:#181818;
  --card-border:rgba(255,255,255,.06);
  --input-bg:#212121;
  --btn-primary-bg:var(--primary);
  --btn-primary-text:#131313;
  --badge-active-bg:rgba(242,202,80,.15);
  --badge-active-text:var(--primary);
  --badge-trial-bg:rgba(96,165,250,.12);
  --badge-trial-text:var(--blue);
  --badge-cancel-bg:rgba(248,113,113,.12);
  --badge-cancel-text:var(--red);
  --sparkbar:#3a3020;
  --sparkbar-active:var(--primary);
  --table-border:rgba(255,255,255,.05);
  --table-hover:rgba(255,255,255,.03);
}

/* ══ FEMININE — Blush Pink Light ══ */
html.t-feminine {
  --bg:#FFFBFF;
  --s1:#FFFFFF;
  --s2:#FFF1F3;
  --s3:#FAEEF0;
  --bd:#F4DDDF;
  --bd2:rgba(216,27,96,.15);
  --primary:#D81B60;
  --primary-d:#AD1457;
  --primary-bg:rgba(216,27,96,.08);
  --primary-glow:rgba(216,27,96,.2);
  --tx:#201A1A;
  --tx2:#534344;
  --tx3:#908E8E;
  --green:#2E7D32;
  --green-bg:rgba(46,125,50,.08);
  --red:#C62828;
  --red-bg:rgba(198,40,40,.08);
  --amber:#E65100;
  --amber-bg:rgba(230,81,0,.08);
  --blue:#1565C0;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
  --sh:0 2px 12px rgba(216,27,96,.08);
  --sh-lg:0 8px 32px rgba(216,27,96,.12);
  --font-h:'Manrope',sans-serif;
  --font-b:'Inter',sans-serif;
  --sidebar-w:220px;
  --sidebar-bg:#FFFFFF;
  --sidebar-border:#F4DDDF;
  --sidebar-active-bg:rgba(216,27,96,.1);
  --sidebar-active-color:var(--primary);
  --sidebar-text:#555555;
  --sidebar-text-hover:#201A1A;
  --topbar-bg:#FFFFFF;
  --card-bg:#FFFFFF;
  --card-border:#F4DDDF;
  --input-bg:#FFF1F3;
  --btn-primary-bg:var(--primary);
  --btn-primary-text:#FFFFFF;
  --badge-active-bg:rgba(216,27,96,.1);
  --badge-active-text:var(--primary);
  --badge-trial-bg:rgba(30,136,229,.1);
  --badge-trial-text:#1565C0;
  --badge-cancel-bg:rgba(198,40,40,.08);
  --badge-cancel-text:#C62828;
  --sparkbar:rgba(216,27,96,.15);
  --sparkbar-active:var(--primary);
  --table-border:rgba(216,27,96,.06);
  --table-hover:rgba(216,27,96,.03);
}

/* ══ NEUTRAL — Professional Blue ══ */
html.t-neutral {
  --bg:#F8FAFC;
  --s1:#FFFFFF;
  --s2:#F1F5F9;
  --s3:#E2E8F0;
  --bd:#CBD5E1;
  --bd2:rgba(0,94,184,.2);
  --primary:#005EB8;
  --primary-d:#004A91;
  --primary-bg:rgba(0,94,184,.08);
  --primary-glow:rgba(0,94,184,.2);
  --tx:#0F172A;
  --tx2:#475569;
  --tx3:#94A3B8;
  --green:#16A34A;
  --green-bg:rgba(22,163,74,.08);
  --red:#DC2626;
  --red-bg:rgba(220,38,38,.07);
  --amber:#D97706;
  --amber-bg:rgba(217,119,6,.08);
  --blue:#005EB8;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  --sh:0 1px 6px rgba(0,0,0,.06);
  --sh-lg:0 4px 20px rgba(0,0,0,.08);
  --font-h:'Syne',sans-serif;
  --font-b:'Nunito',sans-serif;
  --sidebar-w:220px;
  --sidebar-bg:#FFFFFF;
  --sidebar-border:#E2E8F0;
  --sidebar-active-bg:rgba(0,94,184,.1);
  --sidebar-active-color:var(--primary);
  --sidebar-text:#475569;
  --sidebar-text-hover:#0F172A;
  --topbar-bg:#FFFFFF;
  --card-bg:#FFFFFF;
  --card-border:#E2E8F0;
  --input-bg:#F1F5F9;
  --btn-primary-bg:var(--primary);
  --btn-primary-text:#FFFFFF;
  --badge-active-bg:rgba(0,94,184,.1);
  --badge-active-text:var(--primary);
  --badge-trial-bg:rgba(217,119,6,.1);
  --badge-trial-text:var(--amber);
  --badge-cancel-bg:rgba(220,38,38,.08);
  --badge-cancel-text:var(--red);
  --sparkbar:#DBEAFE;
  --sparkbar-active:var(--primary);
  --table-border:#E2E8F0;
  --table-hover:#F8FAFC;
}

/* ════════════════════════════════════════════════
   BASE LAYOUT
   ════════════════════════════════════════════════ */

/* ── LOGIN ── */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
  position: relative;
}
.login-wrap::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--primary-bg), transparent 65%);
  pointer-events: none;
}
.login-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--r-xl);
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  position: relative;
  box-shadow: var(--sh-lg);
}
.login-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-bottom: 6px;
}
.login-logo-row { display: flex; align-items: center; gap: 10px; }
.login-wordmark {
  font-family: var(--font-h);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--tx);
}
.login-accent { color: var(--primary); }
.login-line {
  height: 2px;
  width: 110px;
  background: var(--primary);
  border-radius: 1px;
  margin-top: 2px;
  opacity: .7;
}
.login-sub {
  text-align: center;
  font-size: 13px;
  color: var(--tx3);
  font-weight: 600;
  margin-bottom: 28px;
}
.fg { margin-bottom: 14px; }
.fl {
  display: block;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tx3);
  margin-bottom: 6px;
}
.fi {
  width: 100%;
  padding: 13px 16px;
  border-radius: var(--r-md);
  border: 1px solid var(--bd);
  background: var(--input-bg);
  color: var(--tx);
  font-family: var(--font-b);
  font-size: 15px;
  font-weight: 600;
  outline: none;
  transition: .2s;
}
.fi:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
.fi::placeholder { color: var(--tx3); }
.login-erro {
  background: var(--red-bg);
  border: 1px solid rgba(239,68,68,.25);
  color: var(--red);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 14px;
  display: none;
}
.login-erro.show { display: block; }
.btn-login {
  width: 100%;
  padding: 16px;
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border: none;
  border-radius: var(--r-lg);
  font-family: var(--font-h);
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: .2s;
  box-shadow: 0 4px 18px var(--primary-glow);
}
.btn-login:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
.btn-login:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ── APP LAYOUT: sidebar + main ── */

/* SIDEBAR */

.adm-sidebar::-webkit-scrollbar { display: none; }

.adm-sidebar-logo {
  padding: 0 24px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--sidebar-border);
  margin-bottom: 16px;
}
.adm-sidebar-brand {
  font-family: var(--font-h);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--primary);
}

.adm-nav { flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 3px; }
.adm-nav-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--r-lg);font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--sidebar-text);cursor:pointer;transition:.15s;background:transparent;border:none;width:100%;text-align:left;letter-spacing:.3px}
.adm-nav-item:hover { color: var(--sidebar-text-hover); background: var(--sidebar-active-bg); }
.adm-nav-item.active {
  color: var(--sidebar-active-color);
  background: var(--sidebar-active-bg);
  box-shadow: inset 3px 0 0 var(--primary);
}
html.t-onyx .adm-nav-item.active { box-shadow: none; }
.adm-nav-icon { font-size: 16px; flex-shrink: 0; }

.adm-sidebar-footer {
  margin: 0 12px;
  padding: 14px;
  border-radius: var(--r-lg);
  background: var(--s2);
  border: 1px solid var(--bd);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: .15s;
}
.adm-sidebar-footer:hover { border-color: var(--primary); }
.adm-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-bg);
  border: 1px solid var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-h);
  font-size: 13px;
  font-weight: 800;
  color: var(--primary);
  flex-shrink: 0;
}
.adm-user-name { font-size: 13px; font-weight: 700; color: var(--tx); }
.adm-user-email { font-size: 11px; color: var(--tx3); margin-top: 1px; }

/* MAIN AREA */

/* TOPBAR */
.adm-topbar-L { display: flex; flex-direction: column; gap: 2px; }
.adm-eyebrow {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary);
}
.adm-page-title {
  font-family: var(--font-h);
  font-size: 22px;
  font-weight: 800;
  color: var(--tx);
  line-height: 1.15;
  letter-spacing: -.5px;
}
.adm-topbar-R { display: flex; align-items: center; gap: 10px; }
.btn-topbar {
  padding: 10px 18px;
  border-radius: var(--r-md);
  font-family: var(--font-h);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: .15s;
}
.btn-topbar-outline {
  background: transparent;
  border: 1px solid var(--bd2);
  color: var(--tx2);
}
.btn-topbar-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-topbar-fill {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border: none;
  box-shadow: 0 3px 12px var(--primary-glow);
}
.btn-topbar-fill:hover { filter: brightness(1.08); }

/* CONTENT */
.adm-content::-webkit-scrollbar { width: 5px; }
.adm-content::-webkit-scrollbar-track { background: transparent; }
.adm-content::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--r-xl);
  padding: 14px 14px 12px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh);
  transition: .2s;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--sh-lg); }
.kpi-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:4px}
.kpi-label{font-size:clamp(9px,2vw,11px);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:4px;line-height:1.3}
.kpi-icon{font-size:16px;opacity:.7;flex-shrink:0}
.kpi-value-row{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.kpi-value {
  font-family: var(--font-h);
  font-size: 26px;
  font-weight: 800;
  color: var(--tx);
  line-height: 1;
}
.kpi-delta {
  font-size: 12px;
  font-weight: 700;
}
.kpi-delta.up { color: var(--green); }
.kpi-delta.down { color: var(--red); }
/* Sparkline */
.kpi-spark{display:flex;align-items:flex-end;gap:2px;height:28px;margin-top:auto}
.spark-bar {
  flex: 1;
  background: var(--sparkbar);
  border-radius: 2px 2px 0 0;
  transition: .3s;
}
.spark-bar.active { background: var(--sparkbar-active); }
.kpi-card:hover .spark-bar { background: var(--sparkbar-active); opacity: .5; }
.kpi-card:hover .spark-bar.active { opacity: 1; }

/* ── LAYOUT 2 COLUNAS ── */
.adm-2col{display:flex;flex-direction:column;gap:14px;align-items:stretch}
.adm-2col-main { display: flex; flex-direction: column; gap: 20px; }
.adm-2col-side { display: flex; flex-direction: column; gap: 16px; }

/* ── CARDS GENÉRICOS ── */
.adm-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r-xl);box-shadow:var(--sh);overflow:hidden}
.adm-card-hdr{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--card-border);flex-wrap:wrap}
.adm-card-title {
  font-family: var(--font-h);
  font-size: 15px;
  font-weight: 800;
  color: var(--tx);
}
.adm-card-body { padding: 20px 22px; }
.adm-card-link {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.adm-card-link:hover { opacity: .8; }

/* ── GRÁFICO DE BARRAS ── */
.chart-wrap {
  position: relative;
  height: 200px;
  background: var(--s2);
  border-radius: var(--r-md);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  padding: 12px 12px 0;
  gap: 8px;
  margin-bottom: 8px;
}
.chart-dot-grid {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 2px 2px, var(--bd) 1px, transparent 0);
  background-size: 20px 20px;
  opacity: .4;
  pointer-events: none;
}
.chart-bar {
  flex: 1;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  background: linear-gradient(to top, var(--primary-bg), rgba(242,202,80,.35));
  transition: .3s;
  cursor: pointer;
}
html.t-feminine .chart-bar { background: linear-gradient(to top, rgba(216,27,96,.08), rgba(216,27,96,.4)); }
html.t-feminine .chart-bar.active { background: linear-gradient(to top, rgba(216,27,96,.3), var(--primary)); }
html.t-neutral .chart-bar { background: linear-gradient(to top, rgba(0,94,184,.08), rgba(0,94,184,.35)); }
html.t-neutral .chart-bar.active { background: linear-gradient(to top, rgba(0,94,184,.3), var(--primary)); }
.chart-bar.active {
  background: linear-gradient(to top, var(--primary-bg), var(--sparkbar-active));
  box-shadow: 0 0 20px var(--primary-glow);
}
.chart-bar:hover { opacity: .85; }
.chart-labels {
  display: flex;

<script>
(function(){
  var _origAlert=window.alert;
  window.alert=function(m){
    if(!window.toast){_origAlert(m);return;}
    var ok=m&&(m.startsWith('✅')||m.startsWith('✓')||m.startsWith('OK')||m.startsWith('Senha alterada'));
    window.toast(ok?'success':'error',ok?'Sucesso':'Aviso',String(m).replace(/^✅\s*/,''));
  };
})();
function enviarWhatsApp(tel, pix, nome, valor, venc, link){
  if(!tel){alert('Telefone do estabelecimento não cadastrado.');return;}
  var num=tel.replace(/\D/g,'');
  if(!num.startsWith('55')) num='55'+num;
  var msg='Olá '+nome+'! 👋\n\n'
    +'Segue sua cobrança Agenda 💈\n'
    +'💰 Valor: R$'+valor+'\n'
    +(venc?'📅 Vencimento: '+venc+'\n':'');
  if(pix){
    msg+='\n⚡ *PIX Copia e Cola:*\n'+pix+'\n\nCopie o código acima e pague pelo app do seu banco.';
  } else if(link){
    msg+='\n💳 *Link de pagamento:*\n'+link+'\n\nAcesse o link para efetuar o pagamento.';
  }
  msg+='\n\nQualquer dúvida é só chamar!';
  var url='https://wa.me/'+num+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}
function enviarWhatsAppById(id){
  var c=(window._cobsData||{})[id];
  if(!c){alert('Dados não encontrados.');return;}
  enviarWhatsApp(c.tel,c.pix,c.nome,c.valor,c.venc,c.link);
}

  return r.status===204?null:r.json();
}

  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:r.json();
}

    }).then(r=>r.json()).catch(()=>({ok:false,cobrancas:[]}))

    PENDING:'trial', RECEIVED:'ativo', CONFIRMED:'ativo',
    OVERDUE:'cancelado', CANCELLED:'cancelado', REFUNDED:'cancelado'

  // Build lookup map so WhatsApp handler doesn't need long strings in onclick

  list.forEach(c=>{

  } else {
    html+=`<div class="table-scroll"><table class="adm-table">
      <thead class="adm-table-head">
        <tr>
          <th>Salão</th><th>Valor</th><th>Tipo</th><th>Status</th><th>Vencimento</th><th style="text-align:right">Ações</th>
        </tr>
      </thead><tbody>`;

    list.forEach(c=>{
      // Prefer salao_nome from edge fn; fallback to saloes local

      const statusLbl=STATUS_LABEL[c.status]||c.status||'—';
      const statusCls=STATUS_CLS[c.status]||'cancelado';
      const tipoIco={'PIX':'⚡','BOLETO':'🏦','CREDIT_CARD':'💳','UNDEFINED':'?'}[c.tipo]||'💳';
      const valFmt='R$'+((c.valor||0)/100).toFixed(2);
      const asaas_id=c.asaas_id||c.id||'';

async function cancelarCobAsaas(asaas_id){
  if(!confirm('Cancelar esta cobrança no Asaas?')) return;
  const tok=SESSION&&SESSION.access_token?SESSION.access_token:KEY;
  const r=await fetch(ASAAS_FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
    body:JSON.stringify({action:'cancelar',payment_id:asaas_id})
  });
  const d=await r.json();
  if(d&&d.ok){toast('✓ Cobrança cancelada','ok');navSidebar('cobrancas',null);}
  else{alert('Erro ao cancelar: '+(d.erro||JSON.stringify(d)));}
}

async function confirmarPagamentoAdmin(asaasId){
  const d=window._cobsData&&window._cobsData[asaasId];
  if(!d||!d.salaoId){alert('Dados da cobrança não encontrados. Recarregue a página.');return;}
  if(!confirm('Confirmar pagamento e ativar o salão "'+d.nome+'" agora?')) return;
  try{
    await api('asaas_cobrancas?asaas_id=eq.'+asaasId,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({status:'RECEIVED',pago_em:new Date().toISOString()})});
    const planoValorMap={basico:3500,solo:3500,equipe:7000,pro:7000,negocio:14000,salao:14000};
    let plano=d.planoRef||'equipe';
    if(!planoValorMap[plano]){
      if(d.valorNum<=3500) plano='basico';
      else if(d.valorNum<=7000) plano='equipe';
      else plano='negocio';
    }
    const proximoVenc=new Date();proximoVenc.setDate(proximoVenc.getDate()+30);
    const proximoVencStr=proximoVenc.toISOString().split('T')[0];
    await api('saloes?id=eq.'+d.salaoId,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({status:'ativo',plano:plano,assinatura_status:'ACTIVE',trial_expira:null,vencimento:proximoVencStr})});
    toast('✅ Pagamento confirmado e salão ativado!','ok');
    navSidebar('cobrancas',null);
  }catch(e){alert('Erro: '+e.message);}
}

async function toggleAtivoSalao(salaoId,statusAtual){
  const novoStatus=statusAtual==='bloqueado'?'ativo':'bloqueado';
  const msg=novoStatus==='ativo'?'Liberar acesso para este salão?':'Bloquear este salão?';
  if(!confirm(msg)) return;
  try{
    await api('saloes?id=eq.'+salaoId,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({status:novoStatus})});
    toast(novoStatus==='ativo'?'🔓 Acesso liberado!':'🔒 Salão bloqueado!','ok');
    navSidebar('visaogeral',null);
  }catch(e){alert('Erro: '+e.message);}
}

async function sincronizarPagamentos(){
  const btn=document.getElementById('btnSincronizar');
  if(btn){btn.disabled=true;btn.textContent='⏳ Verificando...';}
  try{
    const res=await fetch('/api/sincronizar-pagamentos',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-cron-secret':window._cronSecret||''}
    });
    const d=await res.json();
    if(!res.ok) throw new Error(d.error||'Erro desconhecido');
    if(d.sincronizados>0){
      toast(`✅ ${d.sincronizados} pagamento(s) reconciliado(s)!`,'ok');
      navSidebar('cobrancas',null);
    } else {
      toast(`Nenhum pagamento novo confirmado (${d.pendentes} pendente(s) verificado(s))`,'ok');
    }
  }catch(e){
    toast('Erro ao sincronizar: '+e.message,'err');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='🔄 Sincronizar';}
  }
}

function copiarPix(texto){
  if(!texto){alert('Chave PIX não disponível');return;}
  navigator.clipboard.writeText(texto).then(()=>{
    toast('✓ PIX copiado!','ok');
  }).catch(()=>{
    // fallback para browsers sem clipboard API
    const ta=document.createElement('textarea');
    ta.value=texto;
    ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✓ PIX copiado!','ok');
  });
}

function ncAutoFill(sel){
  const opt=sel&&sel.selectedOptions[0];
  if(!opt||!opt.value) return;
  const nm=document.getElementById('ncNome');
  const cpf=document.getElementById('ncCpf');
  const em=document.getElementById('ncEmail');
  const cel=document.getElementById('ncCel');
  // Prefer fat_* billing fields over profile fields
  if(nm) nm.value=opt.dataset.nome||'';
  if(cpf&&opt.dataset.cpf){const d=opt.dataset.cpf.replace(/\D/g,'');
    cpf.value=d.length===11?d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'):d;}
  if(em) em.value=opt.dataset.email||'';
  if(cel) cel.value=opt.dataset.tel||'';
}

}

async function resetarSenha(slug,nome){
  const nova=prompt('Nova senha para '+nome+':');
  if(!nova||nova.length<6){alert('Senha deve ter pelo menos 6 caracteres.');return;}
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(nova));
  const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  try{
    await api('saloes?slug=eq.'+slug,{method:'PATCH',body:JSON.stringify({senha_hash:hash,tentativas_login:0,bloqueado_ate:null})});
    alert('✅ Senha alterada com sucesso!');
  }catch(e){alert('Erro: '+e.message);}
}

  const inicioMes=new Date(hoje.getFullYear(),hoje.getMonth(),1).toISOString().split('T')[0];
  const fimMes=hoje.toISOString().split('T')[0];

  // Modal para escolher período
  const html=`<div style="padding:4px 0">
    <div style="font-size:16px;font-weight:800;color:var(--tx);margin-bottom:16px">📊 Exportar Relatório</div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:var(--tx3);display:block;margin-bottom:6px">DATA INÍCIO</label>
      <input id="relDe" type="date" value="${inicioMes}" style="width:100%;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-md);color:var(--tx);font-size:13px">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;font-weight:700;color:var(--tx3);display:block;margin-bottom:6px">DATA FIM</label>
      <input id="relAte" type="date" value="${fimMes}" style="width:100%;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-md);color:var(--tx);font-size:13px">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;font-weight:700;color:var(--tx3);display:block;margin-bottom:6px">ESTABELECIMENTO</label>
      <select id="relSalao" style="width:100%;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-md);color:var(--tx);font-size:13px">
        <option value="">Todos</option>
        ${(clientes||[]).map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="fecharModal()" style="flex:1;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-md);color:var(--tx);font-size:13px;font-weight:700;cursor:pointer">Cancelar</button>
      <button onclick="gerarCSV()" style="flex:1;padding:10px;background:var(--primary);border:none;border-radius:var(--r-md);color:var(--btn-primary-text,#000);font-size:13px;font-weight:800;cursor:pointer">⬇ Baixar CSV</button>
    </div>
  </div>`;
  abrirModal('custom',null,null,null,html);
}

async function gerarCSV(){
  const tok=SESSION&&SESSION.access_token?SESSION.access_token:KEY;
  const de=document.getElementById('relDe')?.value||'';
  const ate=document.getElementById('relAte')?.value||'';
  const salaoId=document.getElementById('relSalao')?.value||'';
  const btn=document.querySelector('[onclick="gerarCSV()"]');
  if(btn){btn.disabled=true;btn.textContent='Gerando...';}

  try{
    // Fetch cobranças
    let cobQuery='asaas_cobrancas?select=id,valor,tipo,status,vencimento,pago_em,plano_ref,salao_id,saloes(nome,slug)&order=vencimento.desc';
    if(de) cobQuery+='&vencimento=gte.'+de;
    if(ate) cobQuery+='&vencimento=lte.'+ate;
    if(salaoId) cobQuery+='&salao_id=eq.'+salaoId;

    const rows=await api(cobQuery);
    if(!rows||!rows.length){alert('Nenhum dado encontrado para o período.');if(btn){btn.disabled=false;btn.textContent='⬇ Baixar CSV';}return;}

    const header='Data Vencimento,Estabelecimento,Slug,Plano,Tipo,Status,Valor (R$),Pago Em';
    const lines=rows.map(r=>[
      r.vencimento||'',
      '"'+(r.saloes?.nome||'').replace(/"/g,'""')+'"',
      r.saloes?.slug||'',
      r.plano_ref||'',
      r.tipo||'',
      r.status||'',
      ((r.valor||0)/100).toFixed(2).replace('.',','),
      r.pago_em?r.pago_em.split('T')[0]:''
    ].join(','));

    var csvBom='\uFEFF';const csv=csvBom+header+'\n'+lines.join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='cortai-faturamento-'+de+'-'+ate+'.csv';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    fecharModal();
  }catch(e){
    alert('Erro: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='⬇ Baixar CSV';}
  }
}

(function(){
  // Attach login handlers FIRST — unconditionally
  // so the button always works regardless of session state
  function attachLogin(){
    var btn=document.getElementById('btnLogin');
    if(!btn||btn._loginAttached) return;
    btn._loginAttached=true;
    btn.addEventListener('click',async function(){
      btn.disabled=true;btn.textContent='Entrando...';
      var err=document.getElementById('loginErro');err.classList.remove('show');
      try{
        var d=await supaAuth(
          document.getElementById('loginEmail').value.trim(),
          document.getElementById('loginSenha').value
        );
        if(!d.access_token)throw new Error('Credenciais inválidas');
        SESSION=d;salvarSessao(d);await mostrarApp();
      }catch(e){
        err.textContent=e.message||'Credenciais inválidas';
        err.classList.add('show');
      }finally{
        btn.disabled=false;btn.textContent='Entrar';
      }
    });
    document.getElementById('loginSenha').addEventListener('keydown',function(e){
      if(e.key==='Enter')document.getElementById('btnLogin').click();
    });
  }

  function showLogin(){
    attachLogin();
    document.getElementById('loginWrap').style.display='flex';
    document.getElementById('appWrap').classList.remove('show');
  }

  // Try to restore session; on ANY failure, show login
  (async function boot(){
    attachLogin(); // attach even before async work
    var sessao=carregarSessao();
    if(sessao){
      SESSION=sessao;
      try{ await mostrarApp(); return; }
      catch(e){
        console.warn('[admin boot] session restore failed:',e.message);
        localStorage.removeItem(SK); SESSION=null;
      }
    }
    showLogin();
  })();
})();
</script>
